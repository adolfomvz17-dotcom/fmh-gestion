<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FMH Asistencia — Staging</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{--teal:#00897B;--teal-d:#00695C;--teal-l:#E0F2F1;--blue:#1A237E;--green:#2E7D32;--red:#C62828;--yellow:#F9A825;--border:#e0e0e0}
body{background:#f5f7f7;color:#333}
.hidden{display:none!important}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E0F2F1,#00897B22)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px #00897B22;text-align:center}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{color:var(--teal);font-size:22px;font-weight:700}
.login-sub{color:#888;font-size:12px;margin-bottom:18px}
.staging-tag{display:inline-block;background:#FFF3E0;color:#E65100;border:1px solid #ffe0b2;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:14px}
.login-box input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--teal)}
.btn-login{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--teal);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar h1{font-size:15px;font-weight:700;line-height:1.2}
.topbar h1 small{font-weight:400;opacity:.85;font-size:11px}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
.btn-salir{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.controls label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:3px}
.controls select,.controls input{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;outline:none}
.controls select:focus,.controls input:focus{border-color:var(--teal)}
.fecha-hoy{background:var(--teal-l);color:var(--teal-d);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600}
.content{flex:1;padding:18px 20px;max-width:900px;margin:0 auto;width:100%}
.daystats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.daystat{flex:1;min-width:90px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.daystat .n{font-size:24px;font-weight:700;color:var(--teal)}
.daystat .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.4px}
.est-row{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.est-info{flex:1;min-width:140px}
.est-nombre{font-weight:600;font-size:15px}
.est-meta{font-size:11px;color:#999;margin-top:2px}
.est-acciones{display:flex;gap:8px;flex-wrap:wrap}
.toggle{border:1.5px solid var(--border);background:#fff;color:#999;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;min-width:96px;text-align:center;user-select:none}
.toggle.on-asist{background:#E8F5E9;border-color:var(--green);color:var(--green)}
.toggle.on-alm{background:var(--teal-l);border-color:var(--teal);color:var(--teal-d)}
.toggle.disabled{opacity:.45;cursor:not-allowed}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-green{background:#E8F5E9;color:var(--green)}
.badge-blue{background:#E3F2FD;color:var(--blue)}
.badge-yellow{background:#FFFDE7;color:#8d6e00}
.badge-red{background:#FFEBEE;color:var(--red)}
.loading,.empty{text-align:center;color:#999;padding:30px;font-size:14px}
.lock-note{background:#FFF3E0;color:#E65100;border:1px solid #ffe0b2;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:14px}
.vista-nav{display:flex;gap:6px}
.vista-btn{padding:8px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#888}
.vista-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.live-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:600;margin-bottom:14px}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.rtab{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.rtab th{background:var(--teal-l);color:var(--teal-d);padding:11px 12px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.rtab td{padding:11px 12px;border-bottom:1px solid #f0f0f0;font-size:14px}
.rtab tr:last-child td{border-bottom:none}
.rtab .tot td{font-weight:700;background:#f8f8f8;color:var(--blue)}
.pctbar{height:8px;background:#eee;border-radius:6px;overflow:hidden;min-width:80px;margin-top:4px}
.pctbar > div{height:100%;background:var(--teal)}
@media(max-width:600px){
  .rtab th:nth-child(3),.rtab td:nth-child(3){display:none}
}
/* reporte diario imprimible */
.report-header{display:none;text-align:center;margin-bottom:16px;border-bottom:2px solid var(--teal);padding-bottom:10px}
.report-header h2{color:var(--teal-d);font-size:20px}
.report-header .meta{font-size:12px;color:#666;margin-top:4px}
.repgrupo{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.repgrupo h3{color:var(--blue);font-size:15px;margin-bottom:8px}
.repgrupo .sub{font-size:12px;color:#777;margin-bottom:10px}
.ck{font-weight:700}
.ck.si{color:var(--green)}
.ck.no{color:#ccc}
.almcount{background:var(--teal-l);color:var(--teal-d);border-radius:12px;padding:14px 16px;font-size:15px;font-weight:700;margin-bottom:16px;text-align:center}
@media print{
  .topbar,.controls,.no-print{display:none!important}
  .content{padding:0!important;max-width:100%!important}
  body{background:#fff!important}
  .report-header{display:block!important}
  .repgrupo,.rtab{box-shadow:none!important;break-inside:avoid}
}
@media(max-width:600px){
  .est-row{flex-direction:column;align-items:stretch}
  .est-acciones{justify-content:stretch}
  .toggle{flex:1}
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, serverTimestamp, writeBatch, increment, query, where, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

// ─── STAGING ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAhY-XKlfpRTIfNksWlI5m43-p6VdU68Fo",
  authDomain: "fmh-gestion-staging.firebaseapp.com",
  projectId: "fmh-gestion-staging",
  storageBucket: "fmh-gestion-staging.firebasestorage.app",
  messagingSenderId: "500631200882",
  appId: "1:500631200882:web:716c77547babe6e0a4ceeb"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ─── ROLES DEL PERSONAL (admin/coord) ─────────────────────────────────────────
// Login real con Firebase Authentication. El personal (Presidente, Psicóloga,
// Coordinadora) se mapea aquí por su correo. Las profesoras NO van aquí: se
// identifican por su correo guardado en la colección 'profesoras' (gestionada
// desde la app de Pagos) y solo ven sus grupos.
const STAFF = {
  'adolfomvz17@gmail.com':            { rol:'admin', nombre:'Presidente'   },
  'tatianag2806.tg@gmail.com':        { rol:'admin', nombre:'Psicóloga'    },
  'creartecoordinacion123@gmail.com': { rol:'coord', nombre:'Coordinadora' },
};

window.DATA = { estudiantes:[], profesoras:[], grupos:[], registros:[] };
let currentUser=null, gruposVisibles=[], grupoSel='', fechaSel='';

const hoyLocal=()=>{const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);};
const activos=arr=>arr.filter(x=>x.activo!==false);
const regId=(fecha,estId)=>`${fecha}_${estId}`;
const regOf=(estId)=>DATA.registros.find(r=>r.id===regId(fechaSel,estId));
const esProfe=()=>currentUser?.rol==='profe';

async function cargarDatos(){
  const [estSnap,profSnap,cfgSnap,regSnap]=await Promise.all([
    getDocs(collection(db,'estudiantes')),
    getDocs(collection(db,'profesoras')),
    getDoc(doc(db,'config','general')),
    getDocs(collection(db,'registros')),
  ]);
  DATA.estudiantes=estSnap.docs.map(d=>({id:d.id,...d.data()}));
  DATA.profesoras=profSnap.docs.map(d=>({id:d.id,...d.data()}));
  DATA.grupos=cfgSnap.exists()?(cfgSnap.data().grupos||[]):[];
  DATA.registros=regSnap.docs.map(d=>({id:d.id,...d.data()}));
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('loginUser').value.trim().toLowerCase();
  const pass=document.getElementById('loginPass').value.trim();
  const errEl=document.getElementById('loginErr');
  errEl.style.display='none';
  if(!email||!pass){ errEl.textContent='Escribe tu correo y contraseña'; errEl.style.display='block'; return; }
  const btn=document.querySelector('.btn-login'); btn.disabled=true; const btnTxt=btn.textContent; btn.textContent='Ingresando…';
  let cred;
  try{
    cred = await signInWithEmailAndPassword(auth, email, pass);
  }catch(err){
    btn.disabled=false; btn.textContent=btnTxt;
    errEl.textContent='Correo o contraseña incorrectos'; errEl.style.display='block';
    return;
  }
  document.getElementById('mainContent').innerHTML='<div class="loading">Cargando…</div>';
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  try{
    await cargarDatos();
  }catch(err){
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    btn.disabled=false; btn.textContent=btnTxt;
    return alert('No se pudieron cargar los datos: '+err.message);
  }
  // resolver rol: primero el personal (STAFF por correo), luego profesoras (por correo)
  const correo=(cred.user.email||'').toLowerCase();
  let found=null;
  const staff=STAFF[correo];
  if(staff){ found={usuario:correo, rol:staff.rol, nombre:staff.nombre}; }
  else{
    const pf=activos(DATA.profesoras).find(x=>((x.email||'').toLowerCase()===correo)||((x.usuario||'').toLowerCase()===correo));
    if(pf) found={usuario:correo, rol:'profe', nombre:pf.nombre, grupos:pf.grupos||[]};
  }
  if(!found){
    await signOut(auth);
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    btn.disabled=false; btn.textContent=btnTxt;
    errEl.textContent='Esta cuenta no tiene acceso. Pide al Presidente que te registre.'; errEl.style.display='block';
    return;
  }
  btn.disabled=false; btn.textContent=btnTxt;
  currentUser=found;
  gruposVisibles = found.rol==='profe' ? (found.grupos||[]) : DATA.grupos;
  grupoSel = gruposVisibles[0]||'';
  fechaSel = hoyLocal();
  document.getElementById('userName').textContent=found.nombre;
  document.getElementById('userRol').textContent={admin:'Administrador',coord:'Coordinadora',profe:'Profesora'}[found.rol];
  renderControles();
  setVista('registro');
}
window.doLogin=doLogin;
window.doLogout=async function(){ if(unsubResumen){unsubResumen();unsubResumen=null;} try{ await signOut(auth); }catch(err){} currentUser=null;document.getElementById('app').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';};
window.cambiarGrupo=function(g){grupoSel=g;renderRegistro();};
window.cambiarFecha=function(f){fechaSel=f||hoyLocal(); if(vista==='resumen') iniciarResumen(); else if(vista==='reporte') iniciarReporte(); else loadRegistrosDia(fechaSel);};

// Trae del servidor los registros del día indicado (datos frescos antes de corregir)
async function loadRegistrosDia(fecha){
  const c=document.getElementById('mainContent'); c.innerHTML='<div class="loading">Cargando…</div>';
  try{
    const snap=await getDocs(query(collection(db,'registros'), where('fecha','==',fecha)));
    const frescos=snap.docs.map(d=>({id:d.id,...d.data()}));
    DATA.registros=DATA.registros.filter(r=>r.fecha!==fecha).concat(frescos);
  }catch(err){ /* si falla, se usa lo que haya en memoria */ }
  renderRegistro();
}

// ─── BARRA DE CONTROLES Y VISTAS ──────────────────────────────────────────────
let vista='registro', unsubResumen=null, regDelDia=[];

function renderControles(){
  const bar=document.getElementById('controlsBar');
  const verResumen = currentUser.rol!=='profe';
  const navHtml = verResumen ? `<div class="vista-nav">
      <button class="vista-btn" id="vbReg" onclick="setVista('registro')">📋 Registro</button>
      <button class="vista-btn" id="vbRes" onclick="setVista('resumen')">📊 Resumen general</button>
      <button class="vista-btn" id="vbRep" onclick="setVista('reporte')">🖨️ Reporte diario</button>
    </div>` : '';
  const grupoHtml = (vista==='registro') ? `<div><label>Grupo</label><select id="grupoSel" onchange="cambiarGrupo(this.value)">${gruposVisibles.map(g=>`<option value="${g}" ${g===grupoSel?'selected':''}>${g}</option>`).join('')||'<option value="">Sin grupos</option>'}</select></div>` : '';
  const fechaHtml = esProfe()
    ? `<div><label>Fecha</label><span class="fecha-hoy">📅 Hoy, ${new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long'})}</span></div>`
    : `<div><label>Fecha</label><input type="date" id="fechaSel" value="${fechaSel}" max="${hoyLocal()}" onchange="cambiarFecha(this.value)"/></div>`;
  bar.innerHTML=navHtml+grupoHtml+fechaHtml;
  if(verResumen){ const map={registro:'vbReg',resumen:'vbRes',reporte:'vbRep'}; document.getElementById(map[vista]).classList.add('active'); }
}

window.setVista=function(v){
  vista=v;
  if(unsubResumen){unsubResumen();unsubResumen=null;}
  renderControles();
  if(v==='resumen') iniciarResumen(); else if(v==='reporte') iniciarReporte(); else loadRegistrosDia(fechaSel);
};

// Resumen general EN VIVO (escucha los registros del día seleccionado)
function iniciarResumen(){
  const c=document.getElementById('mainContent');
  c.innerHTML='<div class="loading">Conectando en vivo…</div>';
  const qy=query(collection(db,'registros'), where('fecha','==',fechaSel));
  unsubResumen=onSnapshot(qy, snap=>{
    regDelDia=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(vista==='resumen') renderResumen();
  }, err=>{ c.innerHTML='<div class="empty">No se pudo conectar en vivo: '+err.message+'</div>'; });
}

function renderResumen(){
  const c=document.getElementById('mainContent');
  const ests=activos(DATA.estudiantes);
  const asistSet=new Set(regDelDia.filter(r=>r.asistio).map(r=>r.estId));
  const almSet=new Set(regDelDia.filter(r=>r.almorzo).map(r=>r.estId));
  const filas=DATA.grupos.map(g=>{
    const enG=ests.filter(e=>e.grupo===g);
    const total=enG.length;
    const asist=enG.filter(e=>asistSet.has(e.id)).length;
    const alm=enG.filter(e=>almSet.has(e.id)).length;
    const pct=total?Math.round(asist/total*100):0;
    return {g,total,asist,alm,pct};
  }).filter(f=>f.total>0);
  const T={total:0,asist:0,alm:0}; filas.forEach(f=>{T.total+=f.total;T.asist+=f.asist;T.alm+=f.alm;});
  const pctT=T.total?Math.round(T.asist/T.total*100):0;
  const esHoy = fechaSel===hoyLocal();
  const fechaTxt=new Date(fechaSel+'T00:00:00').toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});

  c.innerHTML=`
    <div class="live-tag"><span class="live-dot"></span>${esHoy?'En vivo · ':''}${fechaTxt}</div>
    <div class="daystats">
      <div class="daystat"><div class="n">${T.total}</div><div class="l">Estudiantes</div></div>
      <div class="daystat"><div class="n">${T.asist}</div><div class="l">Asistieron</div></div>
      <div class="daystat"><div class="n">${T.alm}</div><div class="l">Almorzaron</div></div>
      <div class="daystat"><div class="n">${pctT}%</div><div class="l">Asistencia</div></div>
    </div>
    <table class="rtab">
      <thead><tr><th>Grado</th><th>Estud.</th><th>Asistieron</th><th>Almorzaron</th><th>% Asistencia</th></tr></thead>
      <tbody>
        ${filas.map(f=>`<tr>
          <td><b>${f.g}</b></td>
          <td>${f.total}</td>
          <td>${f.asist}</td>
          <td>${f.alm}</td>
          <td>${f.pct}%<div class="pctbar"><div style="width:${f.pct}%"></div></div></td>
        </tr>`).join('')}
        <tr class="tot"><td>TOTAL</td><td>${T.total}</td><td>${T.asist}</td><td>${T.alm}</td><td>${pctT}%</td></tr>
      </tbody>
    </table>`;
}

// ─── REPORTE DIARIO IMPRIMIBLE ────────────────────────────────────────────────
async function iniciarReporte(){
  const c=document.getElementById('mainContent');
  c.innerHTML='<div class="loading">Preparando reporte…</div>';
  try{
    const snap=await getDocs(query(collection(db,'registros'), where('fecha','==',fechaSel)));
    regDelDia=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(err){ c.innerHTML='<div class="empty">No se pudo cargar el reporte: '+err.message+'</div>'; return; }
  renderReporte();
}

function renderReporte(){
  const c=document.getElementById('mainContent');
  const ests=activos(DATA.estudiantes);
  const asistSet=new Set(regDelDia.filter(r=>r.asistio).map(r=>r.estId));
  const almSet=new Set(regDelDia.filter(r=>r.almorzo).map(r=>r.estId));
  const fechaTxt=new Date(fechaSel+'T00:00:00').toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  let totalAlm=0, totalAsist=0, totalEst=0;
  const bloques=DATA.grupos.map(g=>{
    const enG=ests.filter(e=>e.grupo===g).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
    if(!enG.length) return '';
    const aG=enG.filter(e=>asistSet.has(e.id)).length;
    const lG=enG.filter(e=>almSet.has(e.id)).length;
    totalEst+=enG.length; totalAsist+=aG; totalAlm+=lG;
    return `<div class="repgrupo">
      <h3>${g}</h3>
      <div class="sub">${enG.length} estudiantes · Asistieron ${aG} · Almorzaron ${lG}</div>
      <table class="rtab"><thead><tr><th>Estudiante</th><th>Asistió</th><th>Almorzó</th></tr></thead><tbody>
        ${enG.map(e=>`<tr>
          <td>${e.nombre}</td>
          <td class="ck ${asistSet.has(e.id)?'si':'no'}">${asistSet.has(e.id)?'✓':'—'}</td>
          <td class="ck ${almSet.has(e.id)?'si':'no'}">${e.alimentacion==='no'?'<span style="color:#bbb;font-weight:400">no aplica</span>':(almSet.has(e.id)?'✓':'—')}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>`;
  }).join('');

  c.innerHTML=`
    <div class="no-print" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-weight:700;color:var(--blue)">Reporte diario</div>
      <button class="vista-btn" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>
    <div class="report-header"><h2>Fundación Mis Habilidades</h2><div style="font-weight:600;color:var(--blue)">Reporte diario de asistencia y almuerzo</div><div class="meta">${fechaTxt}</div></div>
    <div class="almcount">🍽️ Almuerzos del día: ${totalAlm} &nbsp;·&nbsp; 👦 Asistencia: ${totalAsist} de ${totalEst}</div>
    ${bloques||'<div class="empty">No hay estudiantes registrados.</div>'}`;
}
function renderRegistro(){
  const c=document.getElementById('mainContent');
  if(!grupoSel){ c.innerHTML='<div class="empty">No tienes grupos asignados. Pide al Presidente que te asigne grupos en la app de Pagos.</div>'; return; }
  const ests=activos(DATA.estudiantes).filter(e=>e.grupo===grupoSel).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const esPasado = fechaSel<hoyLocal();
  const soloLectura = esProfe() && esPasado; // profe no edita días pasados (no debería poder elegirlos, por si acaso)

  const totalAsist=ests.filter(e=>regOf(e.id)?.asistio).length;
  const totalAlm=ests.filter(e=>regOf(e.id)?.almorzo).length;

  let html='';
  if(!esProfe() && esPasado) html+=`<div class="lock-note">✏️ Estás viendo/corrigiendo un día pasado (${fechaSel}). Los cambios quedan registrados a tu nombre.</div>`;
  html+=`<div class="daystats">
    <div class="daystat"><div class="n">${ests.length}</div><div class="l">Estudiantes</div></div>
    <div class="daystat"><div class="n">${totalAsist}</div><div class="l">Asistieron</div></div>
    <div class="daystat"><div class="n">${totalAlm}</div><div class="l">Almorzaron</div></div>
  </div>`;
  if(!ests.length){ c.innerHTML=html+'<div class="empty">No hay estudiantes activos en este grupo.</div>'; return; }

  html+=ests.map(e=>{
    const r=regOf(e.id);
    const asistio=!!r?.asistio, almorzo=!!r?.almorzo;
    const comeAlm = e.alimentacion!=='no';
    const bal=e.almuerzosBalance||0;
    let almLabel, almTag='';
    if(e.alimentacion==='incluida'){ almTag='<span class="badge badge-green">Incluido</span>'; }
    else if(e.alimentacion==='dia'){ almTag=bal>0?`<span class="badge badge-blue">Saldo ${bal}</span>`:bal<0?`<span class="badge badge-red">Debe ${Math.abs(bal)}</span>`:`<span class="badge badge-yellow">Sin saldo</span>`; }
    else { almTag='<span class="badge badge-yellow">No almuerza</span>'; }
    const dis = soloLectura?'disabled':'';
    return `<div class="est-row">
      <div class="est-info"><div class="est-nombre">${e.nombre}</div><div class="est-meta">${e.modalidad==='TC'?'Tiempo completo':'Medio tiempo'} · ${almTag}</div></div>
      <div class="est-acciones">
        <div class="toggle ${asistio?'on-asist':''} ${dis}" ${dis?'':`onclick="toggleAsistio('${e.id}')"`}>${asistio?'✅ Asistió':'Asistió'}</div>
        ${comeAlm?`<div class="toggle ${almorzo?'on-alm':''} ${dis}" ${dis?'':`onclick="toggleAlmorzo('${e.id}')"`}>${almorzo?'🍽️ Almorzó':'Almorzó'}</div>`:`<div class="toggle disabled">—</div>`}
      </div>
    </div>`;
  }).join('');
  c.innerHTML=html;
}

// marca/desmarca asistencia (sin efecto en saldo)
window.toggleAsistio=async function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const r=regOf(estId);
  const nuevo=!(r?.asistio);
  try{
    const rid=regId(fechaSel,estId);
    const base = r?{}:{estId, grupo:e.grupo, fecha:fechaSel, almorzo:false, creadoEn:serverTimestamp()};
    await setDoc(doc(db,'registros',rid),{...base, asistio:nuevo, registradoPor:currentUser.usuario, modificadoEn:serverTimestamp()},{merge:true});
    if(r) r.asistio=nuevo; else DATA.registros.push({id:rid, estId, grupo:e.grupo, fecha:fechaSel, asistio:nuevo, almorzo:false});
    renderRegistro();
  }catch(err){ alert('No se pudo registrar: '+err.message); }
};

// marca/desmarca almuerzo (descuenta/recupera saldo SOLO si paga por día) — TRANSACCIÓN
window.toggleAlmorzo=async function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  if(e.alimentacion==='no') return;
  const afectaSaldo = e.alimentacion==='dia';
  const rid=regId(fechaSel,estId);
  let nuevo=false, delta=0;
  try{
    await runTransaction(db, async (tx)=>{
      const regRef=doc(db,'registros',rid);
      const snap=await tx.get(regRef);                 // lee el estado REAL en este instante
      const actual = snap.exists() ? !!snap.data().almorzo : false;
      nuevo = !actual;
      delta = afectaSaldo ? (nuevo?-1:1) : 0;          // consumir = -1 ; revertir = +1
      const base = snap.exists()?{}:{estId, grupo:e.grupo, fecha:fechaSel, asistio:false, creadoEn:serverTimestamp()};
      tx.set(regRef,{...base, almorzo:nuevo, registradoPor:currentUser.usuario, modificadoEn:serverTimestamp()},{merge:true});
      if(delta!==0) tx.update(doc(db,'estudiantes',estId),{almuerzosBalance:increment(delta), modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
    });
    // reflejar en memoria local
    const r=regOf(estId);
    if(r) r.almorzo=nuevo; else DATA.registros.push({id:rid, estId, grupo:e.grupo, fecha:fechaSel, asistio:false, almorzo:nuevo});
    if(delta!==0) e.almuerzosBalance=(e.almuerzosBalance||0)+delta;
    renderRegistro();
  }catch(err){ alert('No se pudo registrar el almuerzo: '+err.message); }
};
