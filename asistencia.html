<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FMH Asistencia — Staging</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{--teal:#1B50C9;--teal-d:#123A98;--teal-l:#E8EEFC;--blue:#1A237E;--green:#2E7D32;--red:#C62828;--yellow:#F9A825;--border:#e0e0e0}
body{background:#f5f7f7;color:#333}
.hidden{display:none!important}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E8EEFC,#1B50C922)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px #1B50C922;text-align:center}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{color:var(--teal);font-size:22px;font-weight:700}
.login-sub{color:#888;font-size:12px;margin-bottom:18px}
.staging-tag{display:inline-block;background:#FFF3E0;color:#E65100;border:1px solid #ffe0b2;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:14px}
.login-box input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--teal)}
.btn-login{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--teal);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar h1{font-size:15px;font-weight:700;line-height:1.2}
.topbar h1 small{font-weight:400;opacity:.85;font-size:11px}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
.btn-salir{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.controls label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:3px}
.controls select,.controls input{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;outline:none}
.controls select:focus,.controls input:focus{border-color:var(--teal)}
.fecha-hoy{background:var(--teal-l);color:var(--teal-d);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600}
.content{flex:1;padding:18px 20px;max-width:900px;margin:0 auto;width:100%}
.daystats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.daystat{flex:1;min-width:90px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.daystat .n{font-size:24px;font-weight:700;color:var(--teal)}
.daystat .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.4px}
.est-row{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.est-info{flex:1;min-width:140px}
.est-nombre{font-weight:600;font-size:15px}
.est-meta{font-size:11px;color:#999;margin-top:2px}
.est-acciones{display:flex;gap:8px;flex-wrap:wrap}
.toggle{border:1.5px solid var(--border);background:#fff;color:#999;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;min-width:96px;text-align:center;user-select:none}
.toggle.on-asist{background:#E8F5E9;border-color:var(--green);color:var(--green)}
.toggle.on-alm{background:var(--teal-l);border-color:var(--teal);color:var(--teal-d)}
.toggle.disabled{opacity:.45;cursor:not-allowed}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-green{background:#E8F5E9;color:var(--green)}
.badge-blue{background:#E3F2FD;color:var(--blue)}
.badge-yellow{background:#FFFDE7;color:#8d6e00}
.badge-red{background:#FFEBEE;color:var(--red)}
.loading,.empty{text-align:center;color:#999;padding:30px;font-size:14px}
.lock-note{background:#FFF3E0;color:#E65100;border:1px solid #ffe0b2;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:14px}
.llamado-banner{background:linear-gradient(135deg,#FF6F00,#F9A825);color:#fff;padding:14px 18px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;text-align:center;animation:pulseBanner 1.4s infinite}
@keyframes pulseBanner{0%{filter:brightness(1)}50%{filter:brightness(1.18)}100%{filter:brightness(1)}}
.llamado-banner.ok{background:#2E7D32;animation:none;font-size:14px}
.llamado-btn{background:#fff;color:#E65100;border:none;border-radius:10px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}
/* Aviso de pantalla completa para la profe: imposible no verlo, aunque haya bulla */
.llamado-full{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;padding:24px;animation:flashFull .8s steps(1,end) infinite}
@keyframes flashFull{0%{background:#E65100}50%{background:#C62828}100%{background:#E65100}}
.llamado-full .lf-emoji{font-size:88px;line-height:1;margin-bottom:10px;animation:shake .5s infinite}
@keyframes shake{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
.llamado-full .lf-tit{font-size:34px;font-weight:800;margin-bottom:6px}
.llamado-full .lf-sub{font-size:20px;font-weight:600;margin-bottom:26px;opacity:.95}
.llamado-full .lf-btn{background:#fff;color:#C62828;border:none;border-radius:16px;padding:20px 34px;font-size:24px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.35)}
.llamado-full .lf-mute{margin-top:20px;background:transparent;border:1.5px solid rgba(255,255,255,.7);color:#fff;border-radius:12px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
.comedor-fila{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.llamar-btn{background:#F57C00;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.llamar-btn.sec{background:#fff;color:#F57C00;border:1.5px solid #F57C00}
.cumple-banner{background:linear-gradient(135deg,#FFF3E0,#FCE4EC);border:1px solid #ffd6a5;border-radius:14px;padding:12px 16px;margin-bottom:14px}
.cumple-tit{font-weight:700;color:#E65100;font-size:14px;margin-bottom:6px}
.cumple-lista{font-size:13px;color:#5d4037;line-height:1.7}
.nov-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.nov-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:420px}
.nov-title{font-weight:700;color:var(--blue);font-size:16px}
.nov-box textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;resize:vertical;box-sizing:border-box}
.nov-box textarea:focus{border-color:var(--teal)}
.nov-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
.nov-btn-cancel{background:#fff;border:1.5px solid var(--border);color:#666;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
.nov-btn-save{background:var(--teal);border:none;color:#fff;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer}
.vista-nav{display:flex;gap:6px}
.vista-btn{padding:8px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#888}
.vista-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.live-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:600;margin-bottom:14px}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.rtab{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.rtab th{background:var(--teal-l);color:var(--teal-d);padding:11px 12px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.rtab td{padding:11px 12px;border-bottom:1px solid #f0f0f0;font-size:14px}
.rtab tr:last-child td{border-bottom:none}
.rtab .tot td{font-weight:700;background:#f8f8f8;color:var(--blue)}
.pctbar{height:8px;background:#eee;border-radius:6px;overflow:hidden;min-width:80px;margin-top:4px}
.pctbar > div{height:100%;background:var(--teal)}
@media(max-width:600px){
  .rtab th:nth-child(3),.rtab td:nth-child(3){display:none}
}
/* reporte diario imprimible */
.report-header{display:none;text-align:center;margin-bottom:16px;border-bottom:2px solid var(--teal);padding-bottom:10px}
.report-header h2{color:var(--teal-d);font-size:20px}
.report-header .meta{font-size:12px;color:#666;margin-top:4px}
.repgrupo{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.repgrupo h3{color:var(--blue);font-size:15px;margin-bottom:8px}
.repgrupo .sub{font-size:12px;color:#777;margin-bottom:10px}
.ck{font-weight:700}
.ck.si{color:var(--green)}
.ck.no{color:#ccc}
.almcount{background:var(--teal-l);color:var(--teal-d);border-radius:12px;padding:14px 16px;font-size:15px;font-weight:700;margin-bottom:16px;text-align:center}
@media print{
  .topbar,.controls,.no-print{display:none!important}
  .content{padding:0!important;max-width:100%!important}
  body{background:#fff!important}
  .report-header{display:block!important}
  .repgrupo,.rtab{box-shadow:none!important;break-inside:avoid}
}
@media(max-width:600px){
  .est-row{flex-direction:column;align-items:stretch}
  .est-acciones{justify-content:stretch}
  .toggle{flex:1}
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, serverTimestamp, writeBatch, increment, query, where, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ─── STAGING ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAhY-XKlfpRTIfNksWlI5m43-p6VdU68Fo",
  authDomain: "fmh-gestion-staging.firebaseapp.com",
  projectId: "fmh-gestion-staging",
  storageBucket: "fmh-gestion-staging.firebasestorage.app",

};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ─── ROLES DEL PERSONAL (admin/coord) ─────────────────────────────────────────
// Login real con Firebase Authentication. El personal (Presidente, Psicóloga,
// Coordinadora) se mapea aquí por su correo. Las profesoras NO van aquí: se
// identifican por su correo guardado en la colección 'profesoras' (gestionada
// desde la app de Pagos) y solo ven sus grupos.
const STAFF = {
  'adolfomvz17@gmail.com':            { rol:'admin', nombre:'Presidente'   },
  'tatianag2806.tg@gmail.com':        { rol:'admin', nombre:'Psicóloga'    },
  'creartecoordinacion123@gmail.com': { rol:'coord', nombre:'Coordinadora' },
};

window.DATA = { estudiantes:[], profesoras:[], grupos:[], registros:[] };
let currentUser=null, gruposVisibles=[], grupoSel='', fechaSel='';

const hoyLocal=()=>{const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);};
const activos=arr=>arr.filter(x=>x.activo!==false);
const regId=(fecha,estId)=>`${fecha}_${estId}`;
const regOf=(estId)=>DATA.registros.find(r=>r.id===regId(fechaSel,estId));
const esProfe=()=>currentUser?.rol==='profe';

async function cargarDatos(){
  const [estSnap,profSnap,cfgSnap,regSnap]=await Promise.all([
    getDocs(collection(db,'estudiantes')),
    getDocs(collection(db,'profesoras')),
    getDoc(doc(db,'config','general')),
    getDocs(collection(db,'registros')),
  ]);
  DATA.estudiantes=estSnap.docs.map(d=>({id:d.id,...d.data()}));
  DATA.profesoras=profSnap.docs.map(d=>({id:d.id,...d.data()}));
  DATA.grupos=cfgSnap.exists()?(cfgSnap.data().grupos||[]):[];
  DATA.registros=regSnap.docs.map(d=>({id:d.id,...d.data()}));
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
let loginManual=false, cerroSesion=false;

// Entra a la app con un usuario ya autenticado (sirve para el login manual y para
// reanudar la sesión sola cuando el navegador recarga la página).
async function entrarConUsuario(user, manual){
  const correo=(user.email||'').toLowerCase();
  const errEl=document.getElementById('loginErr');
  document.getElementById('mainContent').innerHTML='<div class="loading">Cargando…</div>';
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  try{
    await cargarDatos();
  }catch(err){
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    if(manual) alert('No se pudieron cargar los datos: '+err.message);
    return false;
  }
  let found=null;
  const staff=STAFF[correo];
  if(staff){ found={usuario:correo, rol:staff.rol, nombre:staff.nombre}; }
  else{
    const pf=activos(DATA.profesoras).find(x=>((x.email||'').toLowerCase()===correo)||((x.usuario||'').toLowerCase()===correo));
    if(pf) found={usuario:correo, rol:'profe', nombre:pf.nombre, grupos:pf.grupos||[]};
  }
  if(!found){
    try{ await signOut(auth); }catch(e){}
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    if(manual){ errEl.textContent='Esta cuenta no tiene acceso. Pide al Presidente que te registre.'; errEl.style.display='block'; }
    return false;
  }
  currentUser=found;
  gruposVisibles = found.rol==='profe' ? (found.grupos||[]) : DATA.grupos;
  grupoSel = gruposVisibles[0]||'';
  fechaSel = hoyLocal();
  document.getElementById('userName').textContent=found.nombre;
  document.getElementById('userRol').textContent={admin:'Administrador',coord:'Coordinadora',profe:'Profesora'}[found.rol];
  renderControles();
  setVista('registro');
  iniciarListenerLlamados();
  return true;
}

async function doLogin(){
  const email=document.getElementById('loginUser').value.trim().toLowerCase();
  const pass=document.getElementById('loginPass').value.trim();
  const errEl=document.getElementById('loginErr');
  errEl.style.display='none';
  if(!email||!pass){ errEl.textContent='Escribe tu correo y contraseña'; errEl.style.display='block'; return; }
  const btn=document.querySelector('.btn-login'); btn.disabled=true; btn.textContent='Ingresando…';
  cerroSesion=false; loginManual=true;
  try{
    await signInWithEmailAndPassword(auth, email, pass);
    // La entrada la maneja onAuthStateChanged (evita entrar dos veces).
  }catch(err){
    loginManual=false; btn.disabled=false; btn.textContent='Ingresar';
    errEl.textContent='Correo o contraseña incorrectos'; errEl.style.display='block';
  }
}
window.doLogin=doLogin;

// Punto único de entrada: reanuda la sesión al recargar y entra tras el login manual.
onAuthStateChanged(auth, async (user)=>{
  if(user && !currentUser && !cerroSesion){
    const manual=loginManual; loginManual=false;
    await entrarConUsuario(user, manual);
  }
  const b=document.querySelector('.btn-login'); if(b){ b.disabled=false; b.textContent='Ingresar'; }
});
window.doLogout=async function(){ if(unsubResumen){unsubResumen();unsubResumen=null;} if(unsubLlamados){unsubLlamados();unsubLlamados=null;} detenerAlarma(); ultimoSonado=''; const bn=document.getElementById('llamadoBanner'); if(bn){ bn.className='hidden'; bn.innerHTML=''; } const fl=document.getElementById('llamadoFull'); if(fl){ fl.className='hidden'; fl.innerHTML=''; } try{ await signOut(auth); }catch(err){} currentUser=null; cerroSesion=true; document.getElementById('app').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';};
window.cambiarGrupo=function(g){grupoSel=g;renderRegistro();};
window.cambiarFecha=function(f){fechaSel=f||hoyLocal(); if(vista==='resumen') iniciarResumen(); else if(vista==='reporte') iniciarReporte(); else if(vista==='inasistencias') iniciarInasistencias(); else if(vista==='edades') renderEdades(); else loadRegistrosDia(fechaSel);};
window.cambiarFiltroGrupo=function(g){ filtroGrupo=g; if(vista==='reporte') renderReporte(); else if(vista==='inasistencias') renderInasistencias(); else if(vista==='edades') renderEdades(); };

// ─── LLAMADO AL COMEDOR (coordinación llama · la profesora confirma) ─────────
// Sonido de alarma: se genera en el propio navegador (no necesita archivos ni internet).
// Los celulares no dejan sonar hasta que la persona toca la pantalla una vez, por eso
// "desbloqueamos" el audio con el primer toque que haga en la app.
let audioCtx=null, alarmaTimer=null, alarmaVeces=0, ultimoSonado='';
function desbloquearAudio(){
  try{
    if(!audioCtx){ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; audioCtx=new AC(); }
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(err){}
}
document.addEventListener('touchstart',desbloquearAudio,{passive:true});
document.addEventListener('click',desbloquearAudio);
function pitido(freq,inicio,dur){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  // onda cuadrada = timbre más penetrante y fuerte, se abre paso entre el ruido
  o.type='square'; o.frequency.value=freq;
  const t=audioCtx.currentTime+inicio;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.9,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+dur+0.05);
}
function sonarAlarma(){
  desbloquearAudio();
  try{
    if(audioCtx && audioCtx.state==='running'){
      // sirena de dos tonos repetida (tipo alarma), fuerte y llamativa
      let t=0;
      for(let i=0;i<4;i++){ pitido(988,t,0.18); pitido(1319,t+0.2,0.18); t+=0.42; }
    }
  }catch(err){}
  try{ if(navigator.vibrate) navigator.vibrate([400,150,400,150,400,150,600]); }catch(err){}
}
function iniciarAlarma(){
  detenerAlarma(); alarmaVeces=0; sonarAlarma();
  // repite cada 4 segundos hasta que la profe confirme (máx. ~3 minutos)
  alarmaTimer=setInterval(()=>{ alarmaVeces++; if(alarmaVeces>=45){ detenerAlarma(); return; } sonarAlarma(); },4000);
}
function detenerAlarma(){ if(alarmaTimer){ clearInterval(alarmaTimer); alarmaTimer=null; } }
window.probarSonido=function(){ desbloquearAudio(); sonarAlarma(); };

const idLlamado = g => hoyLocal()+'_'+String(g).replace(/\//g,'-');
function iniciarListenerLlamados(){
  if(unsubLlamados){unsubLlamados();unsubLlamados=null;}
  const hoy=hoyLocal();
  unsubLlamados=onSnapshot(query(collection(db,'llamados'), where('fecha','==',hoy)), snap=>{
    llamadosHoy={}; snap.docs.forEach(d=>{ const r=d.data(); if(r && r.grupo) llamadosHoy[r.grupo]=r; });
    pintarBannerLlamado();
    if(vista==='comedor') renderComedor();
  }, err=>{ /* si falla, no molestamos al usuario */ });
}
function pintarBannerLlamado(){
  const el=document.getElementById('llamadoBanner');
  const full=document.getElementById('llamadoFull');
  if(!el || !full || !currentUser) return;
  if(!esProfe()){ el.className='hidden'; el.innerHTML=''; full.className='hidden'; full.innerHTML=''; return; }
  const mis=(gruposVisibles||[]);
  const pend=mis.map(g=>llamadosHoy[g]).filter(x=>x && !x.confirmado);
  if(pend.length){
    const l=pend[0];
    // franja normal (por si cierra el aviso grande)
    el.className='llamado-banner';
    el.innerHTML='🔔 <b>¡Pueden bajar al comedor!</b> <span style="opacity:.9;font-weight:400">'+l.grupo+(l.llamadoHora?(' · '+l.llamadoHora):'')+'</span> <button class="llamado-btn" onclick="confirmarLlamado(\''+l.grupo+'\')">✅ Ya vamos</button>';
    // aviso GRANDE de pantalla completa (imposible no verlo)
    full.className='llamado-full';
    full.innerHTML='<div class="lf-emoji">🔔</div>'
      +'<div class="lf-tit">¡BAJAR AL COMEDOR!</div>'
      +'<div class="lf-sub">'+l.grupo+(l.llamadoHora?(' · '+l.llamadoHora):'')+'</div>'
      +'<button class="lf-btn" onclick="confirmarLlamado(\''+l.grupo+'\')">✅ Ya vamos</button>'
      +'<button class="lf-mute" onclick="silenciarAviso()">🔕 Silenciar sonido</button>';
    const clave=l.grupo+'|'+(l.llamadoHora||'');   // si la vuelven a llamar, suena otra vez
    if(ultimoSonado!==clave){ ultimoSonado=clave; iniciarAlarma(); }
    return;
  }
  detenerAlarma();
  full.className='hidden'; full.innerHTML='';
  const conf=mis.map(g=>llamadosHoy[g]).filter(x=>x && x.confirmado);
  if(conf.length){ el.className='llamado-banner ok'; el.innerHTML='✅ Comedor confirmado — '+conf[0].grupo+(conf[0].confirmadoHora?(' · '+conf[0].confirmadoHora):''); return; }
  ultimoSonado='';
  el.className='hidden'; el.innerHTML='';
}

// ─── INASISTENCIAS (solo admin/coord: control de por qué faltó cada niño) ─────
async function iniciarInasistencias(){
  const c=document.getElementById('mainContent');
  c.innerHTML='<div class="loading">Cargando…</div>';
  try{
    const snap=await getDocs(query(collection(db,'registros'), where('fecha','==',fechaSel)));
    regDelDia=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(err){ c.innerHTML='<div class="empty">No se pudo cargar: '+err.message+'</div>'; return; }
  if(vista==='inasistencias') renderInasistencias();
}
function renderInasistencias(){
  const c=document.getElementById('mainContent');
  const ests=activos(DATA.estudiantes);
  const asistSet=new Set(regDelDia.filter(r=>r.asistio).map(r=>r.estId));
  const regMap={}; regDelDia.forEach(r=>{regMap[r.estId]=r;});
  const fechaTxt=new Date(String(fechaSel)+'T00:00:00').toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let totAus=0, totConMotivo=0;
  const bloques=DATA.grupos.filter(g=>!filtroGrupo||g===filtroGrupo).map(g=>{
    const enG=ests.filter(e=>e.grupo===g).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
    if(!enG.length) return '';
    const asistieron=enG.filter(e=>asistSet.has(e.id)).length;
    const ausentes=enG.filter(e=>!asistSet.has(e.id) && matchN(e));
    if(asistieron===0) return `<div class="repgrupo"><h3>${g}</h3><div class="sub" style="color:#888">Asistencia aún no registrada por la profesora.</div></div>`;
    if(!ausentes.length) return `<div class="repgrupo"><h3>${g}</h3><div class="sub" style="color:var(--green)">✓ Todos asistieron.</div></div>`;
    return `<div class="repgrupo">
      <h3>${g} <span style="font-weight:400;font-size:12px;color:var(--red)">— ${ausentes.length} sin asistir</span></h3>
      <table class="rtab"><thead><tr><th>Estudiante</th><th>Motivo de inasistencia</th><th class="no-print"></th></tr></thead><tbody>
      ${ausentes.map(e=>{
        const r=regMap[e.id]; const mot=(r&&r.motivoInasistencia)?r.motivoInasistencia:''; const por=(r&&r.seguimientoPor)?r.seguimientoPor:'';
        totAus++; if(mot) totConMotivo++;
        return `<tr>
          <td>${e.nombre}</td>
          <td>${mot?`${mot}${por?` <span style="font-size:11px;color:#888">— ${por}</span>`:''}`:'<span style="color:#c62828">⚠ Sin motivo</span>'}</td>
          <td class="no-print"><button class="vista-btn" style="padding:6px 12px" onclick="editarMotivoInasistencia('${e.id}')">✏️</button></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
  }).join('');
  const sinMotivo=totAus-totConMotivo;
  c.innerHTML=`
    <div class="no-print" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-weight:700;color:var(--blue)">🚫 Inasistencias</div>
      <button class="vista-btn" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>
    <div class="report-header"><h2>Fundación Mis Habilidades</h2><div style="font-weight:600;color:var(--blue)">Control de inasistencias</div><div class="meta">${fechaTxt}</div></div>
    <div class="almcount" style="background:#FFEBEE;color:#c62828">🚫 ${totAus} sin asistir${sinMotivo>0?` · ⚠ ${sinMotivo} sin justificar`:(totAus>0?' · ✓ todos justificados':'')}</div>
    ${bloques||'<div class="empty">Sin grupos.</div>'}`;
}
window.editarMotivoInasistencia=function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const r=regDelDia.find(x=>x.estId===estId);
  const ov=document.createElement('div'); ov.className='nov-overlay';
  ov.innerHTML=`<div class="nov-box">
    <div class="nov-title">✏️ Motivo de inasistencia — ${e.nombre}</div>
    <div style="font-size:12px;color:#888;margin:2px 0 8px">${fechaSel}</div>
    <textarea id="motTxt" rows="4" placeholder="¿Por qué no asistió?"></textarea>
    <div class="nov-actions"><button class="nov-btn-cancel" id="motCancel">Cancelar</button><button class="nov-btn-save" id="motSave">Guardar</button></div>
  </div>`;
  document.body.appendChild(ov);
  const ta=document.getElementById('motTxt'); ta.value=(r&&r.motivoInasistencia)?r.motivoInasistencia:''; ta.focus();
  const close=()=>ov.remove();
  ov.addEventListener('click',ev=>{ if(ev.target===ov) close(); });
  document.getElementById('motCancel').onclick=close;
  document.getElementById('motSave').onclick=async function(){
    const motivo=(ta.value||'').trim();
    const btn=this; btn.disabled=true; btn.textContent='Guardando…';
    try{
      const rid=regId(fechaSel,estId);
      const base = r?{}:{estId, grupo:e.grupo, fecha:fechaSel, asistio:false, almorzo:false, creadoEn:serverTimestamp()};
      await setDoc(doc(db,'registros',rid),{...base, motivoInasistencia:motivo, seguimientoPor:currentUser.nombre, seguimientoEn:serverTimestamp(), modificadoEn:serverTimestamp()},{merge:true});
      if(r){ r.motivoInasistencia=motivo; r.seguimientoPor=currentUser.nombre; }
      else regDelDia.push({id:rid, estId, grupo:e.grupo, fecha:fechaSel, asistio:false, almorzo:false, motivoInasistencia:motivo, seguimientoPor:currentUser.nombre});
      const dr=DATA.registros.find(x=>x.id===rid); if(dr){ dr.motivoInasistencia=motivo; dr.seguimientoPor=currentUser.nombre; }
      close(); renderInasistencias();
    }catch(err){ btn.disabled=false; btn.textContent='Guardar'; alert('No se pudo guardar: '+err.message); }
  };
};

// ─── EDADES (solo Presidente, Coordinadora y Psicóloga — no profesoras) ────────
function edadYM(fechaNac, refStr){
  const ref = refStr ? new Date(String(refStr)+'T00:00:00') : new Date();
  ref.setHours(0,0,0,0);
  const n=new Date(String(fechaNac)+'T00:00:00');
  if(isNaN(n)||isNaN(ref)) return null;
  let a=ref.getFullYear()-n.getFullYear();
  let m=ref.getMonth()-n.getMonth();
  if(ref.getDate()<n.getDate()) m-=1;
  if(m<0){ a-=1; m+=12; }
  if(a<0) return null;
  return {a,m};
}
async function iniciarEdades(){
  const c=document.getElementById('mainContent');
  c.innerHTML='<div class="loading">Cargando edades…</div>';
  try{ // refresca estudiantes para reflejar fechas recién cargadas en Pagos
    const snap=await getDocs(collection(db,'estudiantes'));
    DATA.estudiantes=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(err){ /* si falla, usa lo que haya en memoria */ }
  if(vista==='edades') renderEdades();
}
function renderEdades(){
  const c=document.getElementById('mainContent');
  const ests=activos(DATA.estudiantes);
  const sinFecha=ests.filter(e=>!e.fechaNacimiento);
  const refTxt=new Date(String(fechaSel)+'T00:00:00').toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fmtF=f=>{const d=new Date(String(f)+'T00:00:00');return isNaN(d)?f:d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});};
  const bloques=DATA.grupos.filter(g=>!filtroGrupo||g===filtroGrupo).map(g=>{
    const enG=ests.filter(e=>e.grupo===g && e.fechaNacimiento && matchN(e)).map(e=>({e,ym:edadYM(e.fechaNacimiento, fechaSel)})).filter(x=>x.ym).sort((a,b)=>(a.e.nombre||'').localeCompare(b.e.nombre||''));
    if(!enG.length) return '';
    return `<div class="repgrupo">
      <h3>${g}</h3>
      <div class="sub">${enG.length} estudiante(s)</div>
      <table class="rtab"><thead><tr><th>Estudiante</th><th>Nacimiento</th><th>Edad</th></tr></thead><tbody>
        ${enG.map(x=>`<tr><td>${x.e.nombre}</td><td>${fmtF(x.e.fechaNacimiento)}</td><td><b>${x.ym.a} años · ${x.ym.m} mes(es)</b></td></tr>`).join('')}
      </tbody></table>
    </div>`;
  }).join('');
  c.innerHTML=`
    <div class="no-print" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-weight:700;color:var(--blue)">👶 Edades de los estudiantes</div>
      <button class="vista-btn" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>
    <div class="report-header"><h2>Fundación Mis Habilidades</h2><div style="font-weight:600;color:var(--blue)">Edades de los estudiantes</div><div class="meta">Edad calculada a: ${refTxt}</div></div>
    <div class="live-tag no-print"><span class="live-dot"></span>Edad a la fecha: ${refTxt}</div>
    ${bloques||'<div class="empty">No hay estudiantes con fecha de nacimiento que coincidan.</div>'}
    ${sinFecha.length?`<div class="lock-note no-print" style="margin-top:12px">📅 ${sinFecha.length} estudiante(s) sin fecha de nacimiento — cárgala en la app de Pagos (Editar).</div>`:''}`;
}

  if(vista==='mensual') renderMensual();
}
function renderMensual(){
  const c=document.getElementById('mainContent');
  const ests=activos(DATA.estudiantes);
  const asisPorEst={}, almPorEst={}, diasSet=new Set();
  regDelMes.forEach(r=>{
    if(r.fecha) diasSet.add(r.fecha);
    if(r.asistio) asisPorEst[r.estId]=(asisPorEst[r.estId]||0)+1;
    if(r.almorzo) almPorEst[r.estId]=(almPorEst[r.estId]||0)+1;
  });
  // Inasistencias del mes: por cada día, en los grados que SÍ tomaron asistencia, contar quién faltó (y si quedó sin justificar)
  const faltasPorEst={}, sinJustPorEst={};
  [...diasSet].forEach(f=>{
    const regsDia=regDelMes.filter(r=>r.fecha===f);
    const asistDia=new Set(regsDia.filter(r=>r.asistio).map(r=>r.estId));
    const gruposConAsist=new Set(regsDia.filter(r=>r.asistio).map(r=>r.grupo));
    const regByEst={}; regsDia.forEach(r=>{regByEst[r.estId]=r;});
    ests.forEach(e=>{
      if(gruposConAsist.has(e.grupo) && !asistDia.has(e.id)){
        faltasPorEst[e.id]=(faltasPorEst[e.id]||0)+1;
        const rr=regByEst[e.id];
        if(!(rr && rr.motivoInasistencia)) sinJustPorEst[e.id]=(sinJustPorEst[e.id]||0)+1;
      }
    });
  });
  const nombreMes=new Date(mesSel+'-01T00:00:00').toLocaleDateString('es-CO',{month:'long',year:'numeric'});
  const filas=DATA.grupos.map(g=>{
    const enG=ests.filter(e=>e.grupo===g);
    if(!enG.length) return null;
    const asist=enG.reduce((s,e)=>s+(asisPorEst[e.id]||0),0);
    const alm=enG.reduce((s,e)=>s+(almPorEst[e.id]||0),0);
    const faltas=enG.reduce((s,e)=>s+(faltasPorEst[e.id]||0),0);
    const sinJust=enG.reduce((s,e)=>s+(sinJustPorEst[e.id]||0),0);
    return {g, total:enG.length, asist, alm, faltas, sinJust};
  }).filter(Boolean);
  const T={asist:0,alm:0,total:0,faltas:0,sinJust:0}; filas.forEach(f=>{T.asist+=f.asist;T.alm+=f.alm;T.total+=f.total;T.faltas+=f.faltas;T.sinJust+=f.sinJust;});
  const detalle=DATA.grupos.map(g=>{
    const enG=ests.filter(e=>e.grupo===g).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
    if(!enG.length) return '';
    return `<div class="repgrupo">
      <h3>${g}</h3>
      <table class="rtab"><thead><tr><th>Estudiante</th><th>Días asistió</th><th>Almuerzos</th><th>Faltas</th><th>Sin justif.</th></tr></thead><tbody>
        ${enG.map(e=>`<tr><td>${e.nombre}</td><td>${asisPorEst[e.id]||0}</td><td>${e.alimentacion==='no'?'<span style="color:#bbb">no aplica</span>':(almPorEst[e.id]||0)}</td><td>${faltasPorEst[e.id]||0}</td><td>${(sinJustPorEst[e.id]||0)?`<b style="color:#c62828">${sinJustPorEst[e.id]}</b>`:'0'}</td></tr>`).join('')}
      </tbody></table>
    </div>`;
  }).join('');
  c.innerHTML=`
    <div class="no-print" style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-weight:700;color:var(--blue)">📅 Reporte mensual — ${nombreMes}</div>
      <button class="vista-btn" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>
    <div class="report-header"><h2>Fundación Mis Habilidades</h2><div style="font-weight:600;color:var(--blue)">Reporte mensual de asistencia y almuerzo</div><div class="meta">${nombreMes} · ${diasSet.size} día(s) con registro</div></div>
    <div style="font-weight:700;color:var(--blue);margin:4px 0 8px">Resumen por grado</div>
    <table class="rtab"><thead><tr><th>Grado</th><th>Estud.</th><th>Asistencias</th><th>Almuerzos</th><th>Faltas</th><th>Sin justif.</th></tr></thead><tbody>
      ${filas.map(f=>`<tr><td><b>${f.g}</b></td><td>${f.total}</td><td>${f.asist}</td><td>${f.alm}</td><td>${f.faltas}</td><td>${f.sinJust?`<b style="color:#c62828">${f.sinJust}</b>`:'0'}</td></tr>`).join('')}
      <tr class="tot"><td>TOTAL</td><td>${T.total}</td><td>${T.asist}</td><td>${T.alm}</td><td>${T.faltas}</td><td>${T.sinJust}</td></tr>
    </tbody></table>
    <div style="font-weight:700;color:var(--blue);margin:18px 0 8px">Detalle por grado</div>
    ${detalle||'<div class="empty">Sin registros en el mes.</div>'}`;
}

function renderResumen(){
  const c=document.getElementById('mainContent');
  const ests=activos(DATA.estudiantes);
  const asistSet=new Set(regDelDia.filter(r=>r.asistio).map(r=>r.estId));
  const almSet=new Set(regDelDia.filter(r=>r.almorzo).map(r=>r.estId));
  const filas=DATA.grupos.map(g=>{
    const enG=ests.filter(e=>e.grupo===g);
    const total=enG.length;

    const alm=enG.filter(e=>almSet.has(e.id)).length;
    const pct=total?Math.round(asist/total*100):0;
    return {g,total,asist,alm,pct};
  }).filter(f=>f.total>0);
  const T={total:0,asist:0,alm:0}; filas.forEach(f=>{T.total+=f.total;T.asist+=f.asist;T.alm+=f.alm;});
  const pctT=T.total?Math.round(T.asist/T.total*100):0;
  const esHoy = fechaSel===hoyLocal();

  c.innerHTML=`
    <div class="live-tag"><span class="live-dot"></span>${esHoy?'En vivo · ':''}${fechaTxt}</div>

      <div class="daystat"><div class="n">${T.total}</div><div class="l">Estudiantes</div></div>
      <div class="daystat"><div class="n">${T.asist}</div><div class="l">Asistieron</div></div>
      <div class="daystat"><div class="n">${T.alm}</div><div class="l">Almorzaron</div></div>
      <div class="daystat"><div class="n">${pctT}%</div><div class="l">Asistencia</div></div>
    </div>
    <table class="rtab">
      <thead><tr><th>Grado</th><th>Estud.</th><th>Asistieron</th><th>Almorzaron</th><th>% Asistencia</th></tr></thead>
      <tbody>
        ${filas.map(f=>`<tr>
          <td><b>${f.g}</b></td>
          <td>${f.total}</td>
          <td>${f.asist}</td>
          <td>${f.alm}</td>
          <td>${f.pct}%<div class="pctbar"><div style="width:${f.pct}%"></div></div></td>
        </tr>`).join('')}
        <tr class="tot"><td>TOTAL</td><td>${T.total}</td><td>${T.asist}</td><td>${T.alm}</td><td>${pctT}%</td></tr>

}

// ─── RECORDATORIO DE CUMPLEAÑOS ───────────────────────────────────────────────
// Estudiantes cuyo cumpleaños "aplica" hoy. Si hoy es lunes, incluye sábado y
// domingo (los del fin de semana se recuerdan el siguiente día de clase).
function cumpleHoy(){
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const fechas=[new Date(hoy)];
  if(hoy.getDay()===1){ // lunes: agrega el sábado y domingo anteriores
    const dom=new Date(hoy); dom.setDate(hoy.getDate()-1); fechas.push(dom);
    const sab=new Date(hoy); sab.setDate(hoy.getDate()-2); fechas.push(sab);
  }
  const mmdd=d=>String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const claves=new Set(fechas.map(mmdd));
  const hoyKey=mmdd(hoy);
  return activos(DATA.estudiantes)
    .filter(e=>gruposVisibles.includes(e.grupo) && e.fechaNacimiento && claves.has(String(e.fechaNacimiento).slice(5,10)))
    .map(e=>{
      const edad=hoy.getFullYear()-parseInt(String(e.fechaNacimiento).slice(0,4));
      return {nombre:e.nombre, grupo:e.grupo, edad:(edad>0&&edad<120)?edad:null, esHoy:String(e.fechaNacimiento).slice(5,10)===hoyKey};
    })
    .sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
}
function bannerCumple(){
  const lista=cumpleHoy();
  if(!lista.length) return '';
  const esLunes=new Date().getDay()===1;
  const items=lista.map(x=>`🎂 <b>${x.nombre}</b> <span style="opacity:.85">(${x.grupo}${x.edad?` · cumple ${x.edad}`:''})</span>${(esLunes&&!x.esHoy)?' <span style="font-size:11px;opacity:.75">— fin de semana</span>':''}`).join('<br>');
  const titulo=esLunes?'🎉 Cumpleaños del fin de semana y de hoy':'🎉 ¡Feliz cumpleaños hoy!';
  return `<div class="cumple-banner"><div class="cumple-tit">${titulo}</div><div class="cumple-lista">${items}</div></div>`;
}

function renderRegistro(){
  const c=document.getElementById('mainContent');
  if(!grupoSel){ c.innerHTML='<div class="empty">No tienes grupos asignados. Pide al Presidente que te asigne grupos en la app de Pagos.</div>'; return; }
  const estsGrupo=activos(DATA.estudiantes).filter(e=>e.grupo===grupoSel).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const ests=estsGrupo.filter(matchN);
  const esPasado = fechaSel<hoyLocal();
  const soloLectura = esProfe() && esPasado; // profe no edita días pasados (no debería poder elegirlos, por si acaso)

  const totalAsist=estsGrupo.filter(e=>regOf(e.id)?.asistio).length;
  const totalAlm=estsGrupo.filter(e=>regOf(e.id)?.almorzo).length;

  let html = fechaSel===hoyLocal() ? bannerCumple() : '';
  if(!esProfe() && esPasado) html+=`<div class="lock-note">✏️ Estás viendo/corrigiendo un día pasado (${fechaSel}). Los cambios quedan registrados a tu nombre.</div>`;
  html+=`<div class="daystats">
    <div class="daystat"><div class="n">${estsGrupo.length}</div><div class="l">Estudiantes</div></div>
    <div class="daystat"><div class="n">${totalAsist}</div><div class="l">Asistieron</div></div>
    <div class="daystat"><div class="n">${totalAlm}</div><div class="l">Almorzaron</div></div>
  </div>`;
  if(!estsGrupo.length){ c.innerHTML=html+'<div class="empty">No hay estudiantes activos en este grupo.</div>'; return; }
  if(!ests.length){ c.innerHTML=html+'<div class="empty">Ningún estudiante coincide con la búsqueda.</div>'; return; }

  html+=ests.map(e=>{
    const r=regOf(e.id);
    const asistio=!!r?.asistio, almorzo=!!r?.almorzo;
    const comeAlm = e.alimentacion!=='no';
    const bal=e.almuerzosBalance||0;
    let almLabel, almTag='';
    if(e.alimentacion==='incluida'){ almTag='<span class="badge badge-green">Incluido</span>'; }
    else if(e.alimentacion==='dia'){ almTag=bal>0?`<span class="badge badge-blue">Saldo ${bal}</span>`:bal<0?`<span class="badge badge-red">Debe ${Math.abs(bal)}</span>`:`<span class="badge badge-yellow">Sin saldo</span>`; }
    else if(e.alimentacion==='mensual'){ almTag='<span class="badge badge-green">Mensual</span>'; }
    else { almTag='<span class="badge badge-yellow">No almuerza</span>'; }
    const dis = soloLectura?'disabled':'';
    const hora = (!esProfe() && asistio && r && r.horaAsistio) ? ` · <span style="color:#00695C;font-weight:600">🕐 ${r.horaAsistio}</span>` : '';
    const nov = (r && r.novedad) ? `<div style="font-size:12px;color:#8d6e00;margin-top:3px">📝 ${r.novedad}</div>` : '';
    return `<div class="est-row">
      <div class="est-info"><div class="est-nombre">${e.nombre}</div><div class="est-meta">${e.modalidad==='TC'?'Tiempo completo':'Medio tiempo'} · ${almTag}${hora}</div>${nov}</div>
      <div class="est-acciones">
        <div class="toggle ${asistio?'on-asist':''} ${dis}" ${dis?'':`onclick="toggleAsistio('${e.id}')"`}>${asistio?'✅ Asistió':'Asistió'}</div>
        ${comeAlm?`<div class="toggle ${almorzo?'on-alm':''} ${dis}" ${dis?'':`onclick="toggleAlmorzo('${e.id}')"`}>${almorzo?'🍽️ Almorzó':'Almorzó'}</div>`:`<div class="toggle disabled">—</div>`}
        <div class="toggle ${dis}" ${dis?'':`onclick="editarNovedad('${e.id}')"`} style="min-width:auto;padding:9px 12px" title="Agregar/editar novedad">📝${(r&&r.novedad)?' ✔':''}</div>
      </div>
    </div>`;
  }).join('');
  c.innerHTML=html;
}

// marca/desmarca asistencia (sin efecto en saldo)
window.toggleAsistio=async function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const r=regOf(estId);
  const nuevo=!(r?.asistio);
  const hora = nuevo ? new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',hour12:true}) : '';
  try{
    const rid=regId(fechaSel,estId);
    const base = r?{}:{estId, grupo:e.grupo, fecha:fechaSel, almorzo:false, creadoEn:serverTimestamp()};
    await setDoc(doc(db,'registros',rid),{...base, asistio:nuevo, horaAsistio:hora, registradoPor:currentUser.usuario, modificadoEn:serverTimestamp()},{merge:true});
    if(r){ r.asistio=nuevo; r.horaAsistio=hora; } else DATA.registros.push({id:rid, estId, grupo:e.grupo, fecha:fechaSel, asistio:nuevo, almorzo:false, horaAsistio:hora});
    renderRegistro();
  }catch(err){ alert('No se pudo registrar: '+err.message); }
};

// Novedad por estudiante del día (la escribe la profe; se guarda en el registro)
window.editarNovedad=function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const r=regOf(estId);
  const ov=document.createElement('div');
  ov.className='nov-overlay';
  ov.innerHTML=`<div class="nov-box">
    <div class="nov-title">📝 Novedad — ${e.nombre}</div>
    <div style="font-size:12px;color:#888;margin:2px 0 8px">${fechaSel}</div>
    <textarea id="novTxt" rows="4" placeholder="Escribe la novedad del día…"></textarea>
    <div class="nov-actions">
      <button class="nov-btn-cancel" id="novCancel">Cancelar</button>
      <button class="nov-btn-save" id="novSave">Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const ta=document.getElementById('novTxt'); ta.value=(r&&r.novedad)?r.novedad:''; ta.focus();
  const close=()=>ov.remove();
  ov.addEventListener('click',ev=>{ if(ev.target===ov) close(); });
  document.getElementById('novCancel').onclick=close;
  document.getElementById('novSave').onclick=async function(){
    const novedad=(ta.value||'').trim();
    const btn=this; btn.disabled=true; btn.textContent='Guardando…';
    try{
      const rid=regId(fechaSel,estId);
      const base = r?{}:{estId, grupo:e.grupo, fecha:fechaSel, asistio:false, almorzo:false, creadoEn:serverTimestamp()};
      await setDoc(doc(db,'registros',rid),{...base, novedad, registradoPor:currentUser.usuario, modificadoEn:serverTimestamp()},{merge:true});
      if(r){ r.novedad=novedad; } else DATA.registros.push({id:rid, estId, grupo:e.grupo, fecha:fechaSel, asistio:false, almorzo:false, novedad});
      close(); renderRegistro();
    }catch(err){ btn.disabled=false; btn.textContent='Guardar'; alert('No se pudo guardar: '+err.message); }
  };
};

// marca/desmarca almuerzo (descuenta/recupera saldo SOLO si paga por día) — TRANSACCIÓN
window.toggleAlmorzo=async function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  if(e.alimentacion==='no') return;
  const afectaSaldo = e.alimentacion==='dia';
  const rid=regId(fechaSel,estId);
  let nuevo=false, delta=0;
  try{
    await runTransaction(db, async (tx)=>{
      const regRef=doc(db,'registros',rid);
      const snap=await tx.get(regRef);                 // lee el estado REAL en este instante
      const actual = snap.exists() ? !!snap.data().almorzo : false;
      nuevo = !actual;
      delta = afectaSaldo ? (nuevo?-1:1) : 0;          // consumir = -1 ; revertir = +1
      const base = snap.exists()?{}:{estId, grupo:e.grupo, fecha:fechaSel, asistio:false, creadoEn:serverTimestamp()};
      tx.set(regRef,{...base, almorzo:nuevo, registradoPor:currentUser.usuario, modificadoEn:serverTimestamp()},{merge:true});
      if(delta!==0) tx.update(doc(db,'estudiantes',estId),{almuerzosBalance:increment(delta), modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
    });
    // reflejar en memoria local
    const r=regOf(estId);
    if(r) r.almorzo=nuevo; else DATA.registros.push({id:rid, estId, grupo:e.grupo, fecha:fechaSel, asistio:false, almorzo:nuevo});
    if(delta!==0) e.almuerzosBalance=(e.almuerzosBalance||0)+delta;
    renderRegistro();
  }catch(err){ alert('No se pudo registrar el almuerzo: '+err.message); }
};
