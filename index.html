<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FMH Pagos — Staging</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{--pink:#E91E8C;--pink3:#FCE4EC;--blue:#1A237E;--green:#2E7D32;--red:#C62828;--yellow:#F9A825;--border:#e0e0e0}
body{background:#f9f9f9;color:#333}
.hidden{display:none!important}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FCE4EC,#E91E8C22)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px #E91E8C22;text-align:center}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{color:var(--pink);font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:#888;font-size:12px;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--pink)}
.btn-login{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.staging-tag{display:inline-block;background:#FFF3E0;color:#E65100;border:1px solid #ffe0b2;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:14px}
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,var(--pink),#c2185b);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.sidebar-logo-text{font-size:13px;font-weight:700;line-height:1.3}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.15)}
.nav-item.active{background:rgba(255,255,255,0.25);border-left-color:#fff}
.nav-item .ico{font-size:18px;width:24px;text-align:center}
.nav-section{padding:8px 20px 4px;font-size:10px;opacity:0.6;text-transform:uppercase;letter-spacing:1px}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.2);font-size:10px;opacity:0.85;line-height:1.5}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar-title{font-size:18px;font-weight:700;color:var(--blue)}
.topbar-info{display:flex;align-items:center;gap:12px;font-size:13px;color:#666;flex-wrap:wrap}
.badge-role{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.role-admin{background:#E8F5E9;color:var(--green)}
.role-coord{background:var(--pink3);color:var(--pink)}
.btn-salir{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#666}
.content{flex:1;overflow-y:auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:16px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:30px;font-weight:700;color:var(--pink)}
.stat-card .lbl{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card.blue .num{color:var(--blue)}.stat-card.green .num{color:var(--green)}
.stat-card.yellow .num{color:var(--yellow)}.stat-card.red .num{color:var(--red)}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--pink3)}
.card-title{font-size:14px;font-weight:700;color:var(--blue)}
.card-body{padding:20px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-red{background:#FFEBEE;color:var(--red);border-left:4px solid var(--red)}
.alert-yellow{background:#FFFDE7;color:#795548;border-left:4px solid var(--yellow)}
.loading{padding:40px;text-align:center;color:#888;font-size:14px}
.construccion{padding:40px;text-align:center;color:#888}
.construccion .ico{font-size:40px;margin-bottom:10px}
/* tabla */
table{width:100%;border-collapse:collapse}
th{background:#f8f8f8;padding:10px 14px;text-align:left;font-size:12px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#E8F5E9;color:var(--green)}
.badge-red{background:#FFEBEE;color:var(--red)}
.badge-yellow{background:#FFFDE7;color:#8d6e00}
.badge-pink{background:var(--pink3);color:var(--pink)}
.badge-blue{background:#E3F2FD;color:var(--blue)}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-pink{background:var(--pink);color:#fff}
.btn-outline{background:none;border:1.5px solid var(--pink);color:var(--pink)}
.btn-red{background:#FFEBEE;color:var(--red)}
.btn-blue{background:#E3F2FD;color:var(--blue)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-bar{flex:1;min-width:200px}
.search-bar input{width:100%;padding:9px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--pink)}
.lock-banner{background:#EDE7F6;border:1px solid #B39DDB;border-radius:10px;padding:10px 14px;font-size:12px;color:#4527A0;margin-bottom:14px}
.empty{text-align:center;color:#aaa;padding:24px;font-size:13px}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700;color:var(--blue)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:#555}
.form-group input,.form-group select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--pink)}
.form-full{grid-column:1/-1}
.hint{font-size:11px;color:#888}
.grp-chip{display:inline-block;padding:6px 12px;margin:4px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;color:#999;user-select:none}
.grp-chip.sel{background:var(--pink);color:#fff;border-color:var(--pink)}
/* pestañas */
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#888}
.tab-btn.active{background:var(--pink);color:#fff;border-color:var(--pink)}
/* fila de meses */
.mes-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.mes-chip{min-width:62px;text-align:center;border-radius:8px;padding:6px 4px;font-size:11px;font-weight:600;border:1px solid transparent;line-height:1.4}
.mes-pagado{background:#E8F5E9;color:var(--green);border-color:#c8e6c9}
.mes-parcial{background:#FFFDE7;color:#8d6e00;border-color:#fff0b3}
.mes-pendiente{background:#FFEBEE;color:var(--red);border-color:#ffcdd2}
.mes-futuro{background:#f4f4f4;color:#aaa;border-color:#eaeaea}
.mes-chip .m{font-size:10px;opacity:.8}
.est-pago-card{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:#fff}
.est-pago-top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
.est-pago-nombre{font-weight:700;color:var(--blue);font-size:14px}
.est-pago-debe{font-size:13px}
/* reportes */
.rep-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.report-header{display:none;text-align:center;margin-bottom:18px;border-bottom:2px solid var(--pink);padding-bottom:12px}
.report-header h2{color:var(--pink);font-size:20px}
.report-header .meta{font-size:12px;color:#666;margin-top:4px}
.rep-total-row td{font-weight:700;background:#FCE4EC;color:var(--blue)}
.rep-card-sel{margin-bottom:16px}
.rep-card-sel select{padding:9px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;min-width:240px}
@media print{
  .sidebar,.topbar,.rep-tabs,.no-print{display:none!important}
  #app,.main,.content{display:block!important;padding:0!important;overflow:visible!important}
  body{background:#fff!important}
  .report-header{display:block!important}
  .card{border:none!important;box-shadow:none!important}
}
@media(max-width:700px){
  .sidebar{width:78px}
  .sidebar-logo-text,.nav-section,.sidebar-footer{display:none}
  .nav-item{flex-direction:column;gap:3px;padding:9px 3px;text-align:center;line-height:1.1}
  .nav-item span{font-size:9px;line-height:1.15;word-break:break-word}
  .nav-item .ico{font-size:21px;width:auto}
  .content{padding:16px}
  .form-grid{grid-template-columns:1fr}
  /* tabla -> tarjetas apiladas */
  table.responsive thead{display:none}
  table.responsive,table.responsive tbody,table.responsive tr,table.responsive td{display:block;width:100%}
  table.responsive tr{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;padding:6px 10px;background:#fff}
  table.responsive tr:hover td{background:none}
  table.responsive td{border:none;padding:7px 4px;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:right}
  table.responsive td::before{content:attr(data-label);font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.4px;text-align:left;flex-shrink:0}
  table.responsive td.acciones{justify-content:flex-end}
}
</style>
</head>

};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmt = v => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(v||0);
// Texto del balance con signo: + a favor, - debe, 0 al día
function balanceTexto(e){
  if(e.alimentacion==='incluida') return 'Incluida';
  if(e.alimentacion==='mensual') return 'Mensual';
  if(e.alimentacion==='no') return '—';
  const b = e.almuerzosBalance||0;
  if(b>0) return 'Saldo: '+b+' días';
  if(b<0) return 'Debe: '+Math.abs(b)+' días';
  return 'Al día';
}
const activos = arr => arr.filter(x=>x.activo!==false);
// Fecha de HOY en horario local (Colombia), no UTC — evita que de noche salte al día siguiente
function hoyLocal(){
  const d=new Date();
  return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
}

// ─── HELPERS DE CARGOS ───────────────────────────────────────────────────────
const cargosDe = (estId,anio=ANIO) => DATA.cargos.filter(c=>c.estId===estId && c.anio===anio && c.activo!==false);
function estadoCargo(c){
  const neto=Math.max(0,(c.valor||0)-(c.descuento||0)); // valor oficial menos el descuento del mes
  const ab=c.abonado||0;
  if(ab>=neto) return 'pagado';
  if(ab>0) return 'parcial';
  return 'pendiente';
}
// Lo que falta por pagar de un cargo (valor oficial − descuento − abonado). El valor oficial NUNCA se toca.
function faltaCargo(c){ return Math.max(0,(c.valor||0)-(c.descuento||0)-(c.abonado||0)); }
// Lo que el estudiante debe HOY: cargos ya vencidos (periodo <= mes actual) y no cubiertos
function debeHoy(estId,anio=ANIO){
  return cargosDe(estId,anio)
    .filter(c=>c.tipo==='mensualidad' && c.periodo<=MES_ACTUAL)
    .reduce((a,c)=>a+faltaCargo(c),0);
}
// Lo que debe HOY de un tipo de cargo mensual (p.ej. 'alimentacion'): meses vencidos no cubiertos
function debeTipoHoy(estId,tipo,anio=ANIO){
  return cargosDe(estId,anio)
    .filter(c=>c.tipo===tipo && c.periodo<=MES_ACTUAL)
    .reduce((a,c)=>a+faltaCargo(c),0);
}

// ─── CARGA DE DATOS (lee las colecciones nuevas) ─────────────────────────────
async function cargarDatos(){
  // estudiantes
  const estSnap = await getDocs(collection(db,'estudiantes'));
  DATA.estudiantes = estSnap.docs.map(d=>({id:d.id, ...d.data()}));
  // profesoras
  const profSnap = await getDocs(collection(db,'profesoras'));
  DATA.profesoras = profSnap.docs.map(d=>({id:d.id, ...d.data()}));
  // config (grupos)
  const cfgSnap = await getDoc(doc(db,'config','general'));
  DATA.grupos = cfgSnap.exists() ? (cfgSnap.data().grupos||[]) : [];
  // cargos (mensualidades / matrícula)
  const cargosSnap = await getDocs(collection(db,'cargos'));
  DATA.cargos = cargosSnap.docs.map(d=>({id:d.id, ...d.data()}));
  // abonos (historial de pagos)
  const abonosSnap = await getDocs(collection(db,'abonos'));
  DATA.abonos = abonosSnap.docs.map(d=>({id:d.id, ...d.data()}));
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('loginUser').value.trim().toLowerCase();
  const pass=document.getElementById('loginPass').value.trim();
  const errEl=document.getElementById('loginErr');
  errEl.style.display='none';
  if(!email||!pass){ errEl.textContent='Escribe tu correo y contraseña'; errEl.style.display='block'; return; }
  const btn=document.querySelector('.btn-login'); btn.disabled=true; const btnTxt=btn.textContent; btn.textContent='Ingresando…';
  let cred;
  try{
    cred = await signInWithEmailAndPassword(auth, email, pass);
  }catch(err){
    btn.disabled=false; btn.textContent=btnTxt;
    errEl.textContent='Correo o contraseña incorrectos'; errEl.style.display='block';
    return;
  }
  const staff = STAFF[(cred.user.email||'').toLowerCase()];
  if(!staff){
    await signOut(auth);
    btn.disabled=false; btn.textContent=btnTxt;
    errEl.textContent='Esta cuenta no tiene acceso a la app de Pagos.'; errEl.style.display='block';
    return;
  }
  currentUser={ usuario:cred.user.email, email:cred.user.email, rol:staff.rol, nombre:staff.nombre };
  btn.disabled=false; btn.textContent=btnTxt;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const rn={admin:'Administrador',coord:'Coordinadora'};
  const rc={admin:'role-admin',coord:'role-coord'};
  const rl=document.getElementById('roleLabel');
  rl.textContent=rn[currentUser.rol]; rl.className='badge-role '+rc[currentUser.rol];
  document.getElementById('userLabel').textContent=currentUser.nombre;
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('sideFooter').innerHTML=`Proyecto:<br><b>${firebaseConfig.projectId}</b>`;
  buildNav();
  document.getElementById('mainContent').innerHTML='<div class="loading">Cargando datos…</div>';
  try{
    await cargarDatos();
    navigate('resumen');
  }catch(err){
    document.getElementById('mainContent').innerHTML=`<div class="alert alert-red">No se pudieron cargar los datos: ${err.message}</div><div class="construccion">Si menciona permisos, revisa que las reglas de Firestore permitan el acceso a usuarios autenticados. Cuéntame qué dice.</div>`;
  }
}

  else enConstruccion(c,titles[page]);

// Reajusta los cargos de un estudiante a sus valores actuales (tras cambiar modalidad/precio/tipo).
// Solo toca meses NO pagados; genera la fila de alimentación mensual si hace falta.
async function actualizarCargosEstudiante(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const mens=cargosDe(estId).filter(c=>c.tipo==='mensualidad');
  const alim=cargosDe(estId).filter(c=>c.tipo==='alimentacion');
  const batch=writeBatch(db); let cambios=0;
  // 1) mensualidad: meses no pagados al valor actual (ene/dic al 50%)
  mens.forEach(c=>{
    const target=(c.periodo===1||c.periodo===12)?Math.round((e.valorMensualidad||0)*0.5):(e.valorMensualidad||0);
    if((c.abonado||0)===0 && (c.descuento||0)===0 && c.valor!==target){
      batch.update(doc(db,'cargos',c.id),{valor:target, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
      c.valor=target; cambios++;
    }
  });
  // 2) alimentación mensual: crear los meses que falten y actualizar los no pagados
  if(e.alimentacion==='mensual'){
    mens.forEach(mc=>{
      const m=mc.periodo;
      const aid=`${estId}_${ANIO}_alim_${String(m).padStart(2,'0')}`;
      const existe=alim.find(c=>c.periodo===m);
      if(!existe){
        const cg={id:aid, estId, anio:ANIO, tipo:'alimentacion', periodo:m, etiqueta:`Alimentación ${MESES[m]} ${ANIO}`, valor:e.valorAlimentacion||0, abonado:0, activo:true};
        batch.set(doc(db,'cargos',aid),{...cg, creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
        DATA.cargos.push(cg); cambios++;
      } else if((existe.abonado||0)===0 && (existe.descuento||0)===0 && existe.valor!==(e.valorAlimentacion||0)){
        batch.update(doc(db,'cargos',aid),{valor:e.valorAlimentacion||0, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
        existe.valor=e.valorAlimentacion||0; cambios++;
      }
    });
  }
  if(cambios) await batch.commit();
  return cambios;
}

window.saveEst=async function(id){
  const nombre=document.getElementById('mNombre').value.trim();
  if(!nombre)return alert('Ingresa el nombre del estudiante');
  const datos={
    nombre,
    fechaNacimiento:document.getElementById('mNacimiento').value||'',
    grupo:document.getElementById('mGrupo').value,
    modalidad:document.getElementById('mMod').value,
    alimentacion:document.getElementById('mAlim').value,
    valorMensualidad:parseInt(document.getElementById('mValM').value)||0,
    valorAlimentacion:parseInt(document.getElementById('mValAlimM').value)||0,
    valorAlmuerzo:parseInt(document.getElementById('mValA').value)||0,
    almuerzosBalance:parseInt(document.getElementById('mBalance').value)||0,
    pagoDividido:document.getElementById('mDividido').checked,
    acudienteA:document.getElementById('mAcuA').value.trim(),
    acudienteB:document.getElementById('mAcuB').value.trim(),
    porcentajeA:Math.min(100,Math.max(0,parseInt(document.getElementById('mPorcA').value)||50)),
  };
  const btn=document.getElementById('btnSaveEst'); btn.disabled=true; btn.textContent='Guardando…';
  try{
    if(id){
      await updateDoc(doc(db,'estudiantes',id),{...datos, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
      const local=DATA.estudiantes.find(x=>x.id===id); Object.assign(local,datos);
      // ofrecer actualizar los cargos a los nuevos valores
      const tieneCargos = DATA.cargos.some(c=>c.estId===id && c.activo!==false && (c.tipo==='mensualidad'||c.tipo==='alimentacion'));
      if(tieneCargos && confirm('¿Actualizar también los CARGOS de este estudiante a los nuevos valores?\n\n• Los meses NO pagados quedan con el valor actual.\n• Los meses ya pagados no se tocan.\n• Si ahora es "Mensual", se le crea la fila de alimentación que falte.\n\nOjo: si le habías bajado a mano el valor de algún mes NO pagado (descuento), volverá al valor completo.')){
        try{ await actualizarCargosEstudiante(id); }
        catch(err){ alert('El estudiante se guardó, pero no se pudieron actualizar los cargos: '+err.message); }
      }
    }else{
      if((datos.valorMensualidad||0)<=0 && !confirm('⚠️ El valor de mensualidad quedó en $0.\nLos meses aparecerán como "sin valor" (no reflejan deuda).\n\n¿Continuar de todas formas?')){ btn.disabled=false; btn.textContent='Guardar'; return; }
      const nuevoId='e'+Date.now();
      const desde=parseInt(document.getElementById('mIngreso').value)||MES_ACTUAL;
      const batch=writeBatch(db);
      // 1) el estudiante
      batch.set(doc(db,'estudiantes',nuevoId),{...datos, activo:true, creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
      // 2) sus cargos mensuales, desde el mes de ingreso hasta diciembre (ene/dic al 50%)
      const nuevosCargos=[];
      for(let m=desde;m<=12;m++){
        const cid=`${nuevoId}_${ANIO}_${String(m).padStart(2,'0')}`;
        const completo=datos.valorMensualidad||0;
        const valor=(m===1||m===12)?Math.round(completo*0.5):completo;
        batch.set(doc(db,'cargos',cid),{ estId:nuevoId, anio:ANIO, tipo:'mensualidad', periodo:m, etiqueta:`${MESES[m]} ${ANIO}`, valor, abonado:0, activo:true, creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario });
        nuevosCargos.push({id:cid, estId:nuevoId, anio:ANIO, tipo:'mensualidad', periodo:m, etiqueta:`${MESES[m]} ${ANIO}`, valor, abonado:0, activo:true});
      }
      // 3) si paga la alimentación como valor mensual aparte, crea también sus cargos de alimentación
      if(datos.alimentacion==='mensual' && (datos.valorAlimentacion||0)>0){
        for(let m=desde;m<=12;m++){
          const aid=`${nuevoId}_${ANIO}_alim_${String(m).padStart(2,'0')}`;
          batch.set(doc(db,'cargos',aid),{ estId:nuevoId, anio:ANIO, tipo:'alimentacion', periodo:m, etiqueta:`Alimentación ${MESES[m]} ${ANIO}`, valor:datos.valorAlimentacion, abonado:0, activo:true, creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario });
          nuevosCargos.push({id:aid, estId:nuevoId, anio:ANIO, tipo:'alimentacion', periodo:m, etiqueta:`Alimentación ${MESES[m]} ${ANIO}`, valor:datos.valorAlimentacion, abonado:0, activo:true});
        }
      }
      await batch.commit();
      DATA.estudiantes.push({id:nuevoId, activo:true, ...datos});
      DATA.cargos.push(...nuevosCargos);
    }
    document.querySelector('.modal-overlay').remove();
    pintarEstudiantes();
  }catch(err){
    btn.disabled=false; btn.textContent='Guardar';
    alert('No se pudo guardar: '+err.message);
  }
};

// Dibuja los 12 chips de meses para un conjunto de cargos (pensión o alimentación).
// Si se pasa clickFn, cada mes con cargo queda clickeable (para ajustar su valor).
function chipsCargos(cargos, clickFn, estId){
  let out='';
  for(let m=1;m<=12;m++){
    const cg=cargos.find(c=>c.periodo===m);
    let clase='mes-futuro', detalle='';
    if(cg){
      if((cg.valor||0)<=0){ clase='mes-futuro'; detalle='sin valor'; }
      else{
        const est=estadoCargo(cg);
        if(m>MES_ACTUAL && est==='pendiente'){ clase='mes-futuro'; }
        else if(est==='pagado'){ clase='mes-pagado'; }
        else if(est==='parcial'){ clase='mes-parcial'; detalle='falta '+fmt(faltaCargo(cg)); }
        else { clase='mes-pendiente'; }
      }
    }
    const desc=(cg&&(cg.descuento||0)>0);
    const click=(cg&&clickFn)?` style="cursor:pointer" onclick="${clickFn}('${estId}',${m})"`:'';
    out+=`<div class="mes-chip ${clase}"${click} title="${cg?('Oficial: '+fmt(cg.valor)+(desc?' · Desc: '+fmt(cg.descuento):'')):'sin cargo'}">${MES_ABBR[m]}${desc?' 🏷️':''}${detalle?`<div class="m">${detalle}</div>`:''}</div>`;
  }
  return out;
}

function renderTabMens(body){
  const ests=activos(DATA.estudiantes).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const hayCargos = DATA.cargos.some(c=>c.tipo==='mensualidad' && c.anio===ANIO);
  const puedeGenerar=can.crearEstudiante();

  let head=`<div class="toolbar">
      <div style="font-weight:700;color:var(--blue)">Mensualidades ${ANIO}</div>
      ${puedeGenerar?`<button class="btn ${hayCargos?'btn-outline':'btn-pink'}" onclick="generarCargosAnio()">📅 ${hayCargos?'Revisar / completar cargos del año':'Generar cargos del año '+ANIO}</button>`:''}
    </div>${hayCargos?`<div class="search-bar" style="margin-bottom:14px"><input placeholder="🔎 Buscar estudiante…" oninput="filtrarMens(this.value)"/></div>`:''}`;

window.generarCargosAnio=async function(){
  const ests=activos(DATA.estudiantes);
  if(!ests.length) return alert('No hay estudiantes activos.');
  // Calcular qué cargos faltan. Para quien ya tiene cargos, NO se rellenan meses
  // anteriores a su primer mes existente (evita inventar deuda previa al ingreso).
  // Para quien no tiene ninguno, se asume año completo (enero–diciembre).
  const aCrear=[];
  ests.forEach(e=>{
    const propios=cargosDe(e.id).filter(c=>c.tipo==='mensualidad');
    const desde = propios.length ? Math.min(...propios.map(c=>c.periodo)) : 1;
    for(let m=desde;m<=12;m++){
      const id=`${e.id}_${ANIO}_${String(m).padStart(2,'0')}`;
      if(DATA.cargos.some(c=>c.id===id)) continue; // ya existe, no tocar
      const completo=e.valorMensualidad||0;
      const valor=(m===1||m===12)?Math.round(completo*0.5):completo; // enero y diciembre 50%
      aCrear.push({id, estId:e.id, anio:ANIO, tipo:'mensualidad', periodo:m, etiqueta:`${MESES[m]} ${ANIO}`, valor});
    }
  });
  if(!aCrear.length) return alert(`Los cargos de ${ANIO} ya están completos para todos los estudiantes activos. No hay nada nuevo que generar.`);
  if(!confirm(`Se van a crear ${aCrear.length} cargo(s) mensuales para ${ANIO}.\n\nEnero y diciembre se cobran al 50%. Esto NO modifica cargos ya existentes ni lo ya abonado.\n\nNota: a un estudiante nuevo (sin cargos) se le crea el año completo; si ingresó a mitad de año, mejor usa el botón "Generar cargos" de su tarjeta y elige el mes de inicio.\n\n¿Continuar?`)) return;
  try{
    const batch=writeBatch(db);
    aCrear.forEach(cg=>{
      batch.set(doc(db,'cargos',cg.id),{
        estId:cg.estId, anio:cg.anio, tipo:cg.tipo, periodo:cg.periodo, etiqueta:cg.etiqueta,
        valor:cg.valor, abonado:0, activo:true,
        creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario
      });
      DATA.cargos.push({...cg, abonado:0, activo:true});
    });
    await batch.commit();
    alert(`✅ Listo. Se crearon ${aCrear.length} cargo(s) para ${ANIO}.`);
    pintarPagTab();
  }catch(err){
    alert('No se pudieron generar los cargos: '+err.message);
  }
};

window.saveAbono=async function(estId, tipo){
  tipo=tipo||'mensualidad';
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const cargoId=document.getElementById('abMes').value;
  const monto=parseInt(document.getElementById('abMonto').value)||0;
  const fecha=document.getElementById('abFecha').value||hoyLocal();
  const metodo=document.getElementById('abMetodo').value||'efectivo';
  const {pagador,pagadorLado}=leerPagador(estId,'ab');
  if(monto<=0) return alert('Ingresa un monto mayor a cero.');

  const cargo=DATA.cargos.find(c=>c.id===cargoId);

  // Reparto EN CASCADA: desde el mes elegido hacia adelante, mes a mes, hasta agotar el monto.
  // El último mes puede quedar como abono parcial. Lo que sobre tras diciembre, se avisa.
  const cargos=cargosDe(estId).filter(c=>c.tipo===tipo).sort((a,b)=>a.periodo-b.periodo);
  const desde=cargos.filter(c=>c.periodo>=cargo.periodo);
  const aplicaciones=[]; // {cargo, monto}
  let restante=monto;
  for(const c of desde){
    if(restante<=0) break;
    const falta=faltaCargo(c);
    if(falta<=0) continue; // mes ya pagado, lo salta
    const aplica=Math.min(restante,falta);
    aplicaciones.push({cargo:c, monto:aplica});
    restante-=aplica;
  }
  const sobrante=restante;

  if(!aplicaciones.length){
    return alert('Ese mes ya está pagado y no hay meses siguientes con saldo. Revisa el monto o el mes elegido.');
  }

  // Si reparte en varios meses o sobra dinero, mostrar el detalle y pedir confirmación.
  if(aplicaciones.length>1 || sobrante>0){
    let detalle=aplicaciones.map(ap=>`• ${MESES[ap.cargo.periodo]}: ${fmt(ap.monto)}${ap.monto<(ap.cargo.valor-ap.cargo.abonado)?' (abono parcial)':''}`).join('\n');
    let msg=`El abono de ${fmt(monto)} se repartirá así:\n\n${detalle}`;
    if(sobrante>0) msg+=`\n\n⚠️ Quedarían ${fmt(sobrante)} sin aplicar (ya no hay más meses en ${ANIO}). Regístralos aparte o reduce el monto.`;
    msg+='\n\n¿Continuar?';
    if(!confirm(msg)) return;
  }

  const btn=document.getElementById('btnSaveAbono'); btn.disabled=true; btn.textContent='Registrando…';
  try{
    const batch=writeBatch(db);
    aplicaciones.forEach(ap=>{
      // 1) suma ATÓMICA al abonado del cargo
      batch.update(doc(db,'cargos',ap.cargo.id),{ abonado:increment(ap.monto), modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario });
      // 2) registro del abono en el historial
      const abId='ab'+Date.now()+'_'+ap.cargo.periodo;
      batch.set(doc(db,'abonos',abId),{
        estId, estudiante:e.nombre, cargoId:ap.cargo.id, tipo, etiqueta:ap.cargo.etiqueta,
        valor:ap.monto, fecha, metodo, pagador, pagadorLado, registradoPor:currentUser.usuario, creadoEn:serverTimestamp()
      });
      DATA.abonos.push({id:abId, estId, estudiante:e.nombre, cargoId:ap.cargo.id, tipo, etiqueta:ap.cargo.etiqueta, valor:ap.monto, fecha, metodo, pagador, pagadorLado});
    });
    await batch.commit();
    // actualizar memoria local (refleja la suma sin recargar)
    aplicaciones.forEach(ap=>{ ap.cargo.abonado=(ap.cargo.abonado||0)+ap.monto; });
    document.querySelector('.modal-overlay').remove();
    pintarPagTab();
    const total=aplicaciones.reduce((a,x)=>a+x.monto,0);
    alert(`✅ Abono de ${fmt(total)} registrado correctamente.`);
  }catch(err){
    btn.disabled=false; btn.textContent='Registrar';
    alert('No se pudo registrar el abono: '+err.message);
  }
};

window.saveAnticipado=async function(estId){
  const e=DATA.estudiantes.find(x=>x.id===estId);
  const mIni=parseInt(document.getElementById('anMesIni').value)||MES_ACTUAL;
  const nMeses=parseInt(document.getElementById('anMeses').value)||0;
  const valorMes=parseInt(document.getElementById('anValorMes').value)||0;
  const motivo=document.getElementById('anMotivo').value.trim();
  const fecha=document.getElementById('anFecha').value||hoyLocal();
  const metodo=document.getElementById('anMetodo').value||'efectivo';
  const {pagador,pagadorLado}=leerPagador(estId,'an');
  if(nMeses<=0) return alert('Indica cuántos meses paga por adelantado.');
  if(valorMes<=0) return alert('Indica el valor con descuento por mes.');
  const mFin=mIni+nMeses-1;
  if(mFin>12) return alert(`No caben ${nMeses} meses desde ${MESES[mIni]} en ${ANIO} (pasaría de diciembre). Reduce los meses.`);
  const plan=[]; let totalOficial=0, totalDesc=0, totalCash=0;
  for(let m=mIni;m<=mFin;m++){
    const mensC=DATA.cargos.find(c=>c.estId===estId && c.tipo==='mensualidad' && c.anio===ANIO && c.periodo===m && c.activo!==false);
    const alimC=DATA.cargos.find(c=>c.estId===estId && c.tipo==='alimentacion' && c.anio===ANIO && c.periodo===m && c.activo!==false);
    const cargosM=[mensC,alimC].filter(Boolean);
    if(!cargosM.length) continue;
    const officialM=cargosM.reduce((s,c)=>s+(c.valor||0),0);
    if(officialM<=0) continue;
    const cashM=Math.min(valorMes, officialM); // no puede pagar más que el valor oficial del mes
    const descM=officialM-cashM;
    let descAsignado=0;
    const rep=cargosM.map((c,i)=>{
      const desc = (i<cargosM.length-1) ? Math.round(descM*(c.valor||0)/officialM) : (descM-descAsignado);
      descAsignado+=desc;
      return {cargo:c, desc, cash:(c.valor||0)-desc};
    });
    plan.push({mes:m, rep});
    totalOficial+=officialM; totalCash+=cashM; totalDesc+=descM;
  }
  if(!plan.length) return alert('Esos meses no tienen cargos generados para este estudiante. Genera los cargos del año primero.');
  if(!confirm(`Pago anticipado de ${plan.length} mes(es) (${MESES[mIni]}–${MESES[mFin]}):\n\n• Valor oficial: ${fmt(totalOficial)}\n• Descuento: ${fmt(totalDesc)}\n• Total a pagar: ${fmt(totalCash)}\n\nEstos meses quedarán PAGADOS con su descuento, sin cambiar la tarifa oficial.\n¿Continuar?`)) return;
  const btn=document.getElementById('btnAnticipado'); btn.disabled=true; btn.textContent='Registrando…';
  try{
    const batch=writeBatch(db); let seq=0;
    plan.forEach(pm=>pm.rep.forEach(r=>{
      batch.update(doc(db,'cargos',r.cargo.id),{ descuento:(r.cargo.descuento||0)+r.desc, abonado:increment(r.cash), motivoDescuento:motivo, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario });
      const abId='ab'+Date.now()+'_ant'+(seq++);
      const rec={id:abId, estId, estudiante:e.nombre, cargoId:r.cargo.id, tipo:r.cargo.tipo, etiqueta:r.cargo.etiqueta, valorOficial:r.cargo.valor, descuento:r.desc, motivo, mesesCubiertos:plan.length, anticipado:true, valor:r.cash, fecha, metodo, pagador, pagadorLado};
      batch.set(doc(db,'abonos',abId),{...rec, registradoPor:currentUser.usuario, creadoEn:serverTimestamp()}); delete rec.id2;
      DATA.abonos.push(rec);
      r.cargo.descuento=(r.cargo.descuento||0)+r.desc; r.cargo.abonado=(r.cargo.abonado||0)+r.cash;
    }));
    const fechaFin=new Date(ANIO, mFin, 0).toISOString().slice(0,10); // último día del mes final
    const ben={ meses:plan.length, desde:mIni, hasta:mFin, hastaFecha:fechaFin, descuentoTotal:totalDesc, totalPagado:totalCash, motivo, fecha };
    batch.update(doc(db,'estudiantes',estId),{ beneficioAnticipado:ben, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario });
    await batch.commit();
    e.beneficioAnticipado=ben;
    document.querySelector('.modal-overlay').remove();
    pintarPagTab();
    alert(`✅ Pago anticipado registrado: ${plan.length} mes(es), total ${fmt(totalCash)} (descuento ${fmt(totalDesc)}). La tarifa oficial no cambió.`);
  }catch(err){ btn.disabled=false; btn.textContent='Registrar pago anticipado'; alert('No se pudo registrar: '+err.message); }
};

// ─── MATRÍCULA (ligada a un año, con aviso por fecha) ────────────────────────
let matYear=ANIO;
const matriculaDe=(estId,year)=>DATA.cargos.find(c=>c.estId===estId && c.tipo==='matricula' && c.anio===year && c.activo!==false);

// Aviso contextual según la fecha (el sistema sugiere; el usuario confirma el monto)
function avisoMatricula(year){
  if(year>ANIO) return {clase:'alert-yellow', msg:`📢 Matrícula anticipada para ${year}. Recuerda aplicar el porcentaje de promoción de pago anticipado que tú definas.`};
  if(year===ANIO){
    if(MES_ACTUAL===1) return {clase:'alert-yellow', msg:`Enero: se cobra el valor total general de la matrícula ${year} (cuando no hubo acuerdo de pago anticipado).`};
    if(MES_ACTUAL>=6) return {clase:'alert-red', msg:`⚠️ Estamos después de mayo. Por norma, para ${year} solo puedes cobrar un porcentaje de la matrícula. Verifica el valor antes de confirmar.`};
  }
  return {clase:'', msg:''};
}
// valor sugerido = última matrícula registrada para ese año (para no retipear)
function valorSugeridoMatricula(year){
  const m=DATA.cargos.filter(c=>c.tipo==='matricula' && c.anio===year);
  return m.length ? m[m.length-1].valor : 0;
}

function renderTabMatricula(body){
  const ests=activos(DATA.estudiantes).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const puedeGestionar=can.crearEstudiante(); // admin crea/edita valor
  const puedePagar=can.registrarAbono();
  const aviso=avisoMatricula(matYear);
  const sinMatricula=ests.filter(e=>!matriculaDe(e.id,matYear));

  let head=`<div class="toolbar">
      <div style="font-weight:700;color:var(--blue)">Matrícula</div>
      <select id="matYearSel" onchange="cambiarMatYear(this.value)" style="padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13px">
        <option value="${ANIO}" ${matYear===ANIO?'selected':''}>Año ${ANIO}</option>
        <option value="${ANIO+1}" ${matYear===ANIO+1?'selected':''}>Año ${ANIO+1} (anticipada)</option>
      </select>
      ${puedeGestionar&&sinMatricula.length?`<button class="btn btn-pink" onclick="generarMatriculas()">🎓 Generar matrícula ${matYear} (${sinMatricula.length} sin crear)</button>`:''}
    </div>
    <div class="search-bar" style="margin-bottom:14px"><input placeholder="🔎 Buscar estudiante…" oninput="filtrarMatr(this.value)"/></div>`;
  if(aviso.msg) head+=`<div class="alert ${aviso.clase}">${aviso.msg}</div>`;

  const cards=ests.map(e=>{
    const m=matriculaDe(e.id,matYear);
    let estadoHtml, acciones='';
    if(!m){
      estadoHtml=`<span style="color:#aaa;font-size:13px">Sin matrícula ${matYear}</span>`;
      if(puedeGestionar) acciones=`<button class="btn btn-blue btn-sm" onclick="openModalMatricula('${e.id}')">+ Crear</button>`;
    }else{
      const est=estadoCargo(m), falta=faltaCargo(m);
      const badge = est==='pagado'?'<span class="badge badge-green">✅ Pagada</span>':est==='parcial'?`<span class="badge badge-yellow">Abonó ${fmt(m.abonado)} · falta ${fmt(falta)}</span>`:'<span class="badge badge-red">Pendiente</span>';
      estadoHtml=`${fmt(m.valor)} &nbsp; ${badge}`;
      if(puedePagar && est!=='pagado') acciones+=`<button class="btn btn-pink btn-sm" onclick="openModalPagoMatricula('${e.id}')">💵 Registrar pago</button>`;
      if(puedeGestionar) acciones+=`<button class="btn btn-blue btn-sm" onclick="openModalMatricula('${e.id}')">✏️ Valor</button>`;
    }
    return `<div class="est-pago-card matr-card" data-nombre="${(e.nombre||'').toLowerCase()}">
      <div class="est-pago-top">
        <span class="est-pago-nombre">${e.nombre} <span class="badge badge-pink" style="font-weight:600">${e.grupo}</span></span>
        <span style="font-size:13px">${estadoHtml}</span>
      </div>
      ${acciones?`<div class="btn-group" style="margin-top:10px">${acciones}</div>`:''}
    </div>`;
  }).join('');
  body.innerHTML=head+cards;
}
window.cambiarMatYear=function(y){matYear=parseInt(y);pintarPagTab();};

window.generarMatriculas=async function(){
  const year=matYear;
  const ests=activos(DATA.estudiantes).filter(e=>!matriculaDe(e.id,year));
  if(!ests.length) return alert(`Todos los estudiantes activos ya tienen matrícula ${year}.`);
  const sugerido=valorSugeridoMatricula(year);
  const aviso=avisoMatricula(year);
  let txt=`Valor de la matrícula ${year} para los ${ests.length} estudiante(s) sin crear:`;
  if(aviso.msg) txt+=`\n\n${aviso.msg}`;
  const entrada=prompt(txt, sugerido||'');
  if(entrada===null) return;
  const valor=parseInt(entrada)||0;
  if(valor<=0) return alert('Ingresa un valor mayor a cero.');
  if(!confirm(`Se creará la matrícula ${year} por ${fmt(valor)} para ${ests.length} estudiante(s).\n\nPodrás ajustar el valor individual luego (promociones, etc.). ¿Continuar?`)) return;
  try{
    const batch=writeBatch(db);
    ests.forEach(e=>{
      const id=`${e.id}_${year}_matricula`;
      const cg={id, estId:e.id, anio:year, tipo:'matricula', periodo:0, etiqueta:`Matrícula ${year}`, valor, abonado:0, activo:true};
      batch.set(doc(db,'cargos',id),{ estId:cg.estId, anio:year, tipo:'matricula', periodo:0, etiqueta:cg.etiqueta, valor, abonado:0, activo:true, creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario });
      DATA.cargos.push(cg);
    });
    await batch.commit();
    alert(`✅ Matrícula ${year} creada para ${ests.length} estudiante(s).`);
    pintarPagTab();
  }catch(err){ alert('No se pudo generar: '+err.message); }
};

  const e=DATA.estudiantes.find(x=>x.id===estId);

  const html=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
  <div class="modal">

// Genera un archivo que abre en Excel. Usa ; como separador (Excel en español) y BOM para acentos.
function descargarCSV(nombreArchivo, encabezados, filas){
  const esc = v => {
    let s = (v===null||v===undefined) ? '' : String(v);
    if(/[";\n]/.test(s)) s = '"'+s.replace(/"/g,'""')+'"';
    return s;
  };
  const lineas = [encabezados, ...filas].map(fila => fila.map(esc).join(';'));
  const contenido = '\uFEFF' + lineas.join('\r\n'); // BOM para que Excel lea bien ñ y tildes
  const blob = new Blob([contenido], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombreArchivo;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
const fechaArchivo = () => hoyLocal();
const btnDescargar = fn => `<button class="btn btn-outline no-print" onclick="${fn}" style="margin-left:8px">⬇️ Descargar Excel</button>`;

};

function estadoDivididoHtml(e){
  if(!e || !e.pagoDividido) return '';
  const pA=(e.porcentajeA!=null?e.porcentajeA:50), pB=100-pA;
  const cargos=cargosDe(e.id).filter(c=>c.tipo==='mensualidad'||c.tipo==='alimentacion').sort((a,b)=>(a.tipo===b.tipo?a.periodo-b.periodo:a.tipo.localeCompare(b.tipo)));
  const mat=matriculaDe(e.id,ANIO); if(mat) cargos.push(mat);
  const pagadoLado=(cargoId,lado)=>DATA.abonos.filter(a=>a.cargoId===cargoId && a.pagadorLado===lado).reduce((s,a)=>s+(a.valor||0),0);
  const conceptoLabel=c=>c.tipo==='mensualidad'?MESES[c.periodo]:(c.tipo==='alimentacion'?('Alim. '+MESES[c.periodo]):('Matrícula '+c.anio));
  const bloque=(lado,nombre,pct)=>{
    let totShare=0,totPaid=0,totOwe=0;
    const filas=cargos.map(c=>{
      const share=Math.round((c.valor||0)*pct/100), paid=pagadoLado(c.id,lado), owe=Math.max(0,share-paid);
      totShare+=share; totPaid+=paid; totOwe+=owe;
      const badge=owe<=0?'<span class="badge badge-green">✓ al día</span>':paid>0?'<span class="badge badge-yellow">parcial</span>':'<span class="badge badge-red">debe</span>';
      return `<tr><td data-label="Concepto">${conceptoLabel(c)}</td><td data-label="Su parte">${fmt(share)}</td><td data-label="Pagó">${fmt(paid)}</td><td data-label="Debe">${owe?fmt(owe):'—'}</td><td data-label="Estado">${badge}</td></tr>`;
    }).join('');
    return `<div style="border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px">
      <div style="font-weight:700;color:var(--pink)">${nombre} <span style="font-weight:400;font-size:12px;color:#888">(${pct}%)</span></div>
      <div style="font-size:13px;margin:4px 0 10px">${totOwe>0?`Debe: <b style="color:var(--red)">${fmt(totOwe)}</b>`:'<b style="color:var(--green)">Al día ✓</b>'} · Su parte total: ${fmt(totShare)} · Ha pagado: ${fmt(totPaid)}</div>
      <table class="responsive"><thead><tr><th>Concepto</th><th>Su parte</th><th>Pagó</th><th>Debe</th><th>Estado</th></tr></thead><tbody>${filas||'<tr><td colspan="5" class="empty">Sin cargos.</td></tr>'}</tbody></table>
    </div>`;
  };
  return `<div class="card-title" style="margin:18px 0 4px">👥 Pago dividido entre acudientes</div>
    ${bloque('A', e.acudienteA||'Acudiente 1', pA)}
    ${bloque('B', e.acudienteB||'Acudiente 2', pB)}`;
}

// 3) ESTADO DE CUENTA POR ESTUDIANTE
function renderRepEstado(b){
  const q=(repBuscar||'').trim().toLowerCase();
  const ests=activos(DATA.estudiantes).filter(e=>(!repGrupo||e.grupo===repGrupo)&&(!q||(e.nombre||'').toLowerCase().includes(q))).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  const sel=filtroReportesHtml()+`<div class="rep-card-sel no-print"><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px">Estudiante</label>
    <select onchange="selRepEst(this.value)"><option value="">— Elige un estudiante —</option>
    ${ests.map(e=>`<option value="${e.id}" ${repEst===e.id?'selected':''}>${e.nombre} (${e.grupo})</option>`).join('')}</select></div>`;
  if(!repEst){ b.innerHTML=sel+`<div class="card"><div class="card-body empty">Elige un estudiante para ver su estado de cuenta.</div></div>`; refocusRepBuscar(); return; }
  const e=DATA.estudiantes.find(x=>x.id===repEst);
  if(!e){ repEst=''; return renderRepEstado(b); }

  // mensualidades
  const meses=cargosDe(e.id).filter(c=>c.tipo==='mensualidad').sort((a,b)=>a.periodo-b.periodo);
  const filasMes=meses.map(c=>{
    const falta=faltaCargo(c); const est=estadoCargo(c); const desc=c.descuento||0;
    const badge=est==='pagado'?'<span class="badge badge-green">Pagado</span>':est==='parcial'?'<span class="badge badge-yellow">Parcial</span>':'<span class="badge badge-red">Pendiente</span>';
    return `<tr><td data-label="Mes">${MESES[c.periodo]}</td><td data-label="Oficial">${fmt(c.valor)}</td><td data-label="Descuento">${desc?fmt(desc):'—'}</td><td data-label="Pagado">${fmt(c.abonado||0)}</td><td data-label="Falta">${falta?fmt(falta):'—'}</td><td data-label="Estado">${badge}</td></tr>`;
  }).join('');
  const totMesVal=meses.reduce((s,c)=>s+c.valor,0), totMesAb=meses.reduce((s,c)=>s+(c.abonado||0),0), totMesDesc=meses.reduce((s,c)=>s+(c.descuento||0),0), totMesFalta=meses.reduce((s,c)=>s+faltaCargo(c),0);
  // matrícula
  const m=matriculaDe(e.id,ANIO);
  const matrTxt=m?`Matrícula ${ANIO}: ${fmt(m.valor)} · abonado ${fmt(m.abonado||0)} · ${estadoCargo(m)==='pagado'?'pagada':'falta '+fmt(faltaCargo(m))}`:`Sin matrícula ${ANIO} registrada`;
  // almuerzos
  const bal=e.almuerzosBalance||0;
  const almTxt=e.alimentacion==='mensual'?'Alimentación mensual (ver detalle abajo)':e.alimentacion!=='dia'?(e.alimentacion==='incluida'?'Almuerzo incluido en la mensualidad':'No toma almuerzo'):(bal>0?`Saldo a favor: ${bal} día(s)`:bal<0?`Debe: ${Math.abs(bal)} día(s) (${fmt(Math.abs(bal)*(e.valorAlmuerzo||0))})`:'Al día');
  // alimentación mensual (cargos aparte)
  const mesesAlim=cargosDe(e.id).filter(c=>c.tipo==='alimentacion').sort((a,b)=>a.periodo-b.periodo);
  const debeTotal=debeHoy(e.id)+debeTipoHoy(e.id,'alimentacion')+(m?faltaCargo(m):0)+(bal<0?Math.abs(bal)*(e.valorAlmuerzo||0):0);

  b.innerHTML=sel+`<div class="toolbar no-print"><div></div><div style="margin-left:auto">${btnImprimir}${btnDescargar('descargarEstado()')}</div></div>
  <div class="card"><div class="card-body">${repHeader('Estado de cuenta')}
    <div style="margin-bottom:14px"><b style="font-size:15px;color:var(--blue)">${e.nombre}</b> &nbsp;<span class="badge badge-pink">${e.grupo}</span></div>
    ${fichaTarifaHtml(e)}
    <div style="font-size:13px;margin-bottom:6px"><b>Matrícula:</b> ${matrTxt}</div>
    <div style="font-size:13px;margin-bottom:14px"><b>Almuerzos:</b> ${almTxt}</div>
    <div class="card-title" style="margin-bottom:8px">Mensualidades ${ANIO}</div>
    ${meses.length?`<table class="responsive"><thead><tr><th>Mes</th><th>Oficial</th><th>Descuento</th><th>Pagado</th><th>Falta</th><th>Estado</th></tr></thead><tbody>${filasMes}
      <tr class="rep-total-row"><td data-label="">TOTALES</td><td data-label="Oficial">${fmt(totMesVal)}</td><td data-label="Descuento">${fmt(totMesDesc)}</td><td data-label="Pagado">${fmt(totMesAb)}</td><td data-label="Falta">${fmt(totMesFalta)}</td><td></td></tr>
      </tbody></table>`:'<div class="empty">No se han generado cargos mensuales.</div>'}
    ${mesesAlim.length?`<div class="card-title" style="margin:16px 0 8px">Alimentación mensual ${ANIO}</div>
    <table class="responsive"><thead><tr><th>Mes</th><th>Oficial</th><th>Descuento</th><th>Pagado</th><th>Falta</th><th>Estado</th></tr></thead><tbody>
    ${mesesAlim.map(c=>{const falta=faltaCargo(c);const desc=c.descuento||0;const est=estadoCargo(c);const badge=est==='pagado'?'<span class="badge badge-green">Pagado</span>':est==='parcial'?'<span class="badge badge-yellow">Parcial</span>':'<span class="badge badge-red">Pendiente</span>';return `<tr><td data-label="Mes">${MESES[c.periodo]}</td><td data-label="Oficial">${fmt(c.valor)}</td><td data-label="Descuento">${desc?fmt(desc):'—'}</td><td data-label="Pagado">${fmt(c.abonado||0)}</td><td data-label="Falta">${falta?fmt(falta):'—'}</td><td data-label="Estado">${badge}</td></tr>`;}).join('')}
    </tbody></table>`:''}
    <div class="alert ${debeTotal>0?'alert-red':'alert-yellow'}" style="margin-top:16px">
      ${debeTotal>0?`Saldo pendiente total a hoy: <b>${fmt(debeTotal)}</b>`:`✅ El estudiante está al día con lo vencido a hoy.`}
    </div>
    ${estadoDivididoHtml(e)}
  </div></div>`;
  refocusRepBuscar();
}
window.selRepEst=function(id){repEst=id;pintarRepTab();};

// ─── CONFIGURACIÓN (solo Presidente) ─────────────────────────────────────────
function renderConfig(c){
  if(!can.verConfig()){ c.innerHTML=`<div class="lock-banner">🔒 Solo el Presidente puede ver la configuración.</div>`; return; }
  pintarConfig(c);
}

function pintarConfig(c){
  const grupos=DATA.grupos||[];
  const chips=grupos.map((g,i)=>`<span class="badge badge-pink" style="padding:7px 12px;font-size:13px;margin:4px;display:inline-flex;align-items:center;gap:8px">${g}<span style="cursor:pointer;font-weight:700;opacity:.7" title="Eliminar" onclick="eliminarGrupo(${i})">✕</span></span>`).join('');
  c.innerHTML=`
  <div class="card">
    <div class="card-header"><span class="card-title">🏷️ Grupos de la fundación</span></div>
    <div class="card-body">
      <div style="margin-bottom:14px">${grupos.length?chips:'<span class="empty">No hay grupos.</span>'}</div>
      <div class="toolbar" style="margin-bottom:0">
        <div class="search-bar" style="max-width:280px"><input id="newGrupo" placeholder="Nombre del nuevo grupo…" onkeydown="if(event.key==='Enter')agregarGrupo()"/></div>
        <button class="btn btn-pink" onclick="agregarGrupo()">+ Agregar grupo</button>
      </div>
      <div class="hint" style="margin-top:10px">No se puede eliminar un grupo que tenga estudiantes activos asignados; primero reasígnalos.</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">🔐 Acceso y contraseñas</span></div>
    <div class="card-body">
      <div class="alert alert-yellow" style="margin-bottom:0">El manejo de usuarios y contraseñas (login real, cambio seguro de claves) se implementa en la <b>Fase 1</b>. Por ahora las credenciales son temporales de pruebas.</div>
    </div>
  </div>`;
}

async function guardarGrupos(){
  await setDoc(doc(db,'config','general'),{ grupos:DATA.grupos, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario },{merge:true});
}

window.agregarGrupo=async function(){
  const inp=document.getElementById('newGrupo');
  const nombre=(inp.value||'').trim();
  if(!nombre) return;
  if((DATA.grupos||[]).some(g=>g.toLowerCase()===nombre.toLowerCase())) return alert('Ese grupo ya existe.');
  DATA.grupos.push(nombre);
  try{
    await guardarGrupos();
    pintarConfig(document.getElementById('mainContent'));
  }catch(err){ DATA.grupos.pop(); alert('No se pudo guardar: '+err.message); }
};

window.eliminarGrupo=async function(idx){
  const g=DATA.grupos[idx];
  const enUso=activos(DATA.estudiantes).filter(e=>e.grupo===g);
  if(enUso.length) return alert(`No se puede eliminar "${g}": tiene ${enUso.length} estudiante(s) activo(s) asignado(s).\n\nReasígnalos a otro grupo primero.`);
  if(!confirm(`¿Eliminar el grupo "${g}"?`)) return;
  const copia=[...DATA.grupos];
  DATA.grupos.splice(idx,1);
  try{
    await guardarGrupos();
    pintarConfig(document.getElementById('mainContent'));
  }catch(err){ DATA.grupos=copia; alert('No se pudo eliminar: '+err.message); }
};

// ─── PROFESORAS ───────────────────────────────────────────────────────────────
function renderProfesoras(c){
  const esAdmin=currentUser.rol==='admin';
  const profes=activos(DATA.profesoras).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  c.innerHTML=`
    ${!esAdmin?`<div class="lock-banner">🔒 Como Coordinadora puedes asignar grupos a las profesoras. Crear, editar datos o inactivar es solo del Presidente.</div>`:''}
    ${esAdmin?`<div class="toolbar"><button class="btn btn-pink" onclick="openModalProfe()">+ Agregar profesora</button></div>`:''}
    <div class="card">
      <div class="card-header"><span class="card-title">👩‍🏫 Profesoras (${profes.length})</span></div>
      <table class="responsive">
        <thead><tr><th>Nombre</th><th>Correo</th><th>Grupos</th><th>Acciones</th></tr></thead>
        <tbody>${profes.length?profes.map(p=>{
          const grupos=(p.grupos||[]).map(g=>`<span class="badge badge-pink" style="margin:2px">${g}</span>`).join('')||'<span style="color:#aaa">Sin grupos</span>';
          return `<tr>
            <td data-label="Nombre"><b>${p.nombre}</b></td>
            <td data-label="Correo">${p.email||p.usuario||''}</td>
            <td data-label="Grupos">${grupos}</td>
            <td data-label="Acciones" class="acciones"><div class="btn-group">
              <button class="btn btn-blue btn-sm" onclick="openModalProfe('${p.id}')">${esAdmin?'✏️ Editar':'🏷️ Grupos'}</button>
              ${esAdmin?`<button class="btn btn-red btn-sm" onclick="inactivarProfe('${p.id}')">🗑️ Inactivar</button>`:''}
            </div></td>
          </tr>`;
        }).join(''):`<tr><td colspan="4" class="empty">No hay profesoras registradas.</td></tr>`}</tbody>
      </table>
    </div>`;
}

window.openModalProfe=function(id){
  const esAdmin=currentUser.rol==='admin';
  const p=id?DATA.profesoras.find(x=>x.id===id):{grupos:[]};
  const dis=esAdmin?'':'disabled';
  const sel=new Set(p.grupos||[]);
  const chips=(DATA.grupos||[]).map(g=>`<span class="grp-chip ${sel.has(g)?'sel':''}" data-grupo="${g}" onclick="this.classList.toggle('sel')">${g}</span>`).join('')||'<span class="hint">No hay grupos. Créalos en Configuración.</span>';
  const titulo=id?(esAdmin?'Editar profesora':'Asignar grupos'):'Agregar profesora';
  const html=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">${titulo}</span><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
    <div class="form-grid">
      <div class="form-group form-full"><label>Nombre completo</label><input id="pfNombre" value="${p.nombre||''}" ${dis}/></div>
      <div class="form-group form-full"><label>Correo (para iniciar sesión)</label><input id="pfCorreo" type="email" value="${p.email||p.usuario||''}" ${dis}/></div>
    </div>
    <div class="form-group form-full" style="margin-top:12px"><label>Grupos asignados</label><div id="pfGrupos">${chips}</div><span class="hint">Toca los grupos para asignar o quitar.</span></div>
    ${esAdmin?`<div class="hint" style="margin-top:8px">📌 La contraseña se crea aparte en Firebase → Authentication, con este mismo correo. Aquí registras el correo y los grupos.</div>`:''}
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      <button class="btn btn-pink" id="btnSaveProfe" onclick="saveProfe('${id||''}')">Guardar</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
};

window.saveProfe=async function(id){
  const esAdmin=currentUser.rol==='admin';
  const grupos=[...document.querySelectorAll('#pfGrupos .grp-chip.sel')].map(c=>c.dataset.grupo);
  const btn=document.getElementById('btnSaveProfe'); btn.disabled=true; btn.textContent='Guardando…';
  try{
    if(esAdmin){
      const nombre=document.getElementById('pfNombre').value.trim();
      const email=document.getElementById('pfCorreo').value.trim().toLowerCase();
      if(!nombre||!email){ btn.disabled=false; btn.textContent='Guardar'; return alert('Completa el nombre y el correo.'); }
      if(DATA.profesoras.some(x=>x.id!==id && x.activo!==false && (x.email||x.usuario||'').toLowerCase()===email)){ btn.disabled=false; btn.textContent='Guardar'; return alert('Ese correo ya está en uso por otra profesora.'); }
      const datos={nombre, email, usuario:email, grupos};
      if(id){
        await updateDoc(doc(db,'profesoras',id),{...datos, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
        Object.assign(DATA.profesoras.find(x=>x.id===id),datos);
      }else{
        const nuevoId='p'+Date.now();
        await setDoc(doc(db,'profesoras',nuevoId),{...datos, activo:true, creadoEn:serverTimestamp(), creadoPor:currentUser.usuario, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
        DATA.profesoras.push({id:nuevoId, activo:true, ...datos});
      }
    }else{
      // Coordinadora: solo grupos
      await updateDoc(doc(db,'profesoras',id),{grupos, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
      DATA.profesoras.find(x=>x.id===id).grupos=grupos;
    }
    document.querySelector('.modal-overlay').remove();
    renderProfesoras(document.getElementById('mainContent'));
  }catch(err){ btn.disabled=false; btn.textContent='Guardar'; alert('No se pudo guardar: '+err.message); }
};

window.inactivarProfe=async function(id){
  const p=DATA.profesoras.find(x=>x.id===id);
  if(!confirm(`¿Inactivar a "${p.nombre}"?\n\nNo podrá iniciar sesión, pero el dato no se borra.`))return;
  try{
    await updateDoc(doc(db,'profesoras',id),{activo:false, modificadoEn:serverTimestamp(), modificadoPor:currentUser.usuario});
    p.activo=false;
    renderProfesoras(document.getElementById('mainContent'));
  }catch(err){ alert('No se pudo inactivar: '+err.message); }
};

</script>
</body>
