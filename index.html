<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fundación Mis Habilidades</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{--pink:#E91E8C;--pink2:#F48FB1;--pink3:#FCE4EC;--blue:#1A237E;--green:#2E7D32;--red:#C62828;--yellow:#F9A825;--border:#e0e0e0}
body{background:#f9f9f9;color:#333}
.hidden{display:none!important}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FCE4EC,#E91E8C22)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px #E91E8C22;text-align:center}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{color:var(--pink);font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:#888;font-size:12px;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--pink)}
.btn-login{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,var(--pink),#c2185b);color:#fff;padding:0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.sidebar-logo-text{font-size:13px;font-weight:700;line-height:1.3}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;transition:background 0.15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.15)}
.nav-item.active{background:rgba(255,255,255,0.25);border-left-color:#fff}
.nav-item .ico{font-size:18px;width:24px;text-align:center}
.nav-section{padding:8px 20px 4px;font-size:10px;opacity:0.6;text-transform:uppercase;letter-spacing:1px}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.2);font-size:11px;opacity:0.8}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:18px;font-weight:700;color:var(--blue)}
.topbar-info{display:flex;align-items:center;gap:12px;font-size:13px;color:#666}
.badge-role{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.role-admin{background:#E8F5E9;color:var(--green)}
.role-coord{background:var(--pink3);color:var(--pink)}
.role-profe{background:#E3F2FD;color:var(--blue)}
.btn-salir{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#666}
.content{flex:1;overflow-y:auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:16px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:32px;font-weight:700;color:var(--pink)}
.stat-card .lbl{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card.blue .num{color:var(--blue)}
.stat-card.green .num{color:var(--green)}
.stat-card.yellow .num{color:var(--yellow)}
.stat-card.red .num{color:var(--red)}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--pink3)}
.card-title{font-size:14px;font-weight:700;color:var(--blue)}
table{width:100%;border-collapse:collapse}
th{background:#f8f8f8;padding:10px 14px;text-align:left;font-size:12px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#E8F5E9;color:var(--green)}
.badge-red{background:#FFEBEE;color:var(--red)}
.badge-yellow{background:#FFFDE7;color:var(--yellow)}
.badge-pink{background:var(--pink3);color:var(--pink)}
.badge-blue{background:#E3F2FD;color:var(--blue)}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-pink{background:var(--pink);color:#fff}
.btn-pink:hover{background:#c2185b}
.btn-outline{background:none;border:1.5px solid var(--pink);color:var(--pink)}
.btn-red{background:#FFEBEE;color:var(--red);border:none}
.btn-green{background:#E8F5E9;color:var(--green);border:none}
.btn-blue{background:#E3F2FD;color:var(--blue);border:none}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:#555}
.form-group input,.form-group select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--pink)}
.form-full{grid-column:1/-1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--blue)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa}
.saldo-bar{height:8px;border-radius:20px;background:#eee;overflow:hidden;margin-top:4px}
.saldo-fill{height:100%;border-radius:20px;transition:width 0.3s}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-red{background:#FFEBEE;color:var(--red);border-left:4px solid var(--red)}
.alert-yellow{background:#FFFDE7;color:#795548;border-left:4px solid var(--yellow)}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#888}
.tab-btn.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--pink)}
.deuda-chip{display:inline-flex;align-items:center;gap:4px;background:#FFEBEE;color:var(--red);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.lock-banner{background:#EDE7F6;border:1px solid #B39DDB;border-radius:10px;padding:12px 16px;font-size:13px;color:#4527A0;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.grupos-check{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.grupo-chip{display:flex;align-items:center;gap:4px;background:#f5f5f5;border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;user-select:none}
.grupo-chip.selected{background:var(--pink3);border-color:var(--pink);color:var(--pink);font-weight:600}
@media(max-width:700px){.sidebar{width:60px}.sidebar-logo-text,.nav-item span,.nav-section,.sidebar-footer{display:none}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🌸</div>
    <div class="login-title">Mis Habilidades</div>
    <div class="login-sub">Fundación de Rehabilitación Integral, Formación y Educación — Ibagué, Tolima</div>
    <input id="loginUser" placeholder="Usuario"/>
    <input id="loginPass" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()"/>
    <p id="loginErr" style="color:var(--pink);font-size:12px;margin-bottom:8px;display:none">Usuario o contraseña incorrectos</p>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<button class="hamburger" onclick="toggleMenu()" id="hamburger">☰</button>
<div class="sidebar-overlay" id="sideOverlay" onclick="closeMenu()"></div>
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🌸</div>
      <div class="sidebar-logo-text">Fundación<br>Mis Habilidades</div>
    </div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-footer">© 2026 FMH Ibagué</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Resumen</div>
      <div class="topbar-info">
        <span id="todayDate"></span>
        <span class="badge-role" id="roleLabel"></span>
        <span id="userLabel" style="font-weight:600"></span>
        <button class="btn-salir" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9PVOIOgPUH6n032V3k-I4RpibUBZBujw",
  authDomain: "fmh-mishabilidades.firebaseapp.com",
  projectId: "fmh-mishabilidades",
  storageBucket: "fmh-mishabilidades.firebasestorage.app",
  messagingSenderId: "124208084513",
  appId: "1:124208084513:web:fff3ca5ff599ff4f48d560"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ─── CREDENCIALES ─────────────────────────────────────────────────────────────
const ADMIN_CRED = {id:'admin', pass:'Admin2025', role:'admin', nombre:'Presidente'};
const COORD_CRED = {id:'coordinadora', pass:'Maritza2026', role:'coord', nombre:'Coordinadora'};

function getUsers(){
  const profes = DATA.profesoras.filter(p=>p.usuario&&p.password)
    .map(p=>({id:p.usuario, pass:p.password, role:'profe', nombre:p.nombre, grupos:p.grupos||[]}));
  return [ADMIN_CRED, COORD_CRED, ...profes];
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
window.DATA = {
  grupos:['BABYLAND','TODDLERS','KINDER 3','KINDER 4','TRANSITION','FIRST','SECOND','THIRD','FOURTH','FIFTH','UAI'],
  profesoras:[],
  estudiantes:[],
  registros:[],
  pagos:[],
};

// Firebase save/load
async function saveFirebase(){
  try { await setDoc(doc(db,'fmh','data'), JSON.parse(JSON.stringify(DATA))); } catch(e){ console.log('FB save error:',e); }
}
async function loadFirebase(){
  try {
    const snap = await getDoc(doc(db,'fmh','data'));
    if(snap.exists()) window.DATA = snap.data();
  } catch(e){ console.log('FB load error:',e); }
}
window.save = function(){ saveFirebase(); localStorage.setItem('fmh_v3', JSON.stringify(DATA)); };

// Cargar datos
const local = localStorage.getItem('fmh_v3');
if(local) window.DATA = JSON.parse(local);
await loadFirebase();

let currentUser = null, currentPage = 'resumen';

// ─── PERMISOS ─────────────────────────────────────────────────────────────────
const can = {
  crearEstudiante:  ()=> currentUser?.role==='admin',
  eliminarEstudiante:()=> currentUser?.role==='admin',
  editarEstudiante: ()=> ['admin','coord'].includes(currentUser?.role),
  crearProfesora:   ()=> currentUser?.role==='admin',
  eliminarProfesora:()=> currentUser?.role==='admin',
  asignarGrupos:    ()=> ['admin','coord'].includes(currentUser?.role),
  verFinanciero:    ()=> ['admin','coord'].includes(currentUser?.role),
  registrarPagos:   ()=> ['admin','coord'].includes(currentUser?.role),
  verConfig:        ()=> currentUser?.role==='admin',
  verAlertas:       ()=> ['admin','coord'].includes(currentUser?.role),
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function toggleMenu(){
  const s=document.querySelector('.sidebar');
  const o=document.getElementById('sideOverlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function closeMenu(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sideOverlay').classList.remove('open');
}
// Cerrar menú al navegar en móvil
const _origNavigate = window.navigate;
window.navigate = function(page){
  closeMenu();
  navigate(page);
};
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const found=getUsers().find(x=>x.id===u&&x.pass===p);
  if(!found){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  currentUser=found;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const rn={admin:'Presidente',coord:'Coordinadora',profe:'Profesora'};
  const rc={admin:'role-admin',coord:'role-coord',profe:'role-profe'};
  const rl=document.getElementById('roleLabel');
  rl.textContent=rn[found.role]; rl.className='badge-role '+rc[found.role];
  document.getElementById('userLabel').textContent=found.nombre;
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  buildNav(); navigate('resumen');
}
window.doLogin=doLogin;

function doLogout(){
  currentUser=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}
window.doLogout=doLogout;

// ─── NAV ──────────────────────────────────────────────────────────────────────
function buildNav(){
  const nav=document.getElementById('sideNav');
  const r=currentUser.role;
  let items=[];
  if(r==='admin'||r==='coord'){
    items=[
      {section:'General'},{id:'resumen',ico:'📊',label:'Resumen'},{id:'registro',ico:'✅',label:'Registro Diario'},
      {section:'Gestión'},{id:'estudiantes',ico:'👦',label:'Estudiantes'},{id:'profesoras',ico:'👩‍🏫',label:'Profesoras'},
      {section:'Finanzas'},{id:'pagos',ico:'💰',label:'Pagos y Deudas'},{id:'reportes',ico:'📄',label:'Reportes PDF'},
    ];
    if(r==='admin') items.push({section:'Configuración'},{id:'config',ico:'⚙️',label:'Configuración'});
  } else {
    items=[{id:'resumen',ico:'📊',label:'Resumen'},{id:'registro',ico:'✅',label:'Registro Diario'},{id:'reportes',ico:'📄',label:'Mis Reportes'}];
  }
  nav.innerHTML=items.map(i=>i.section
    ?`<div class="nav-section">${i.section}</div>`
    :`<div class="nav-item" id="nav_${i.id}" onclick="navigate('${i.id}')"><span class="ico">${i.ico}</span><span>${i.label}</span></div>`
  ).join('');
}

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav_'+page); if(el)el.classList.add('active');
  const titles={resumen:'Resumen del Día',registro:'Registro Diario',estudiantes:'Gestión de Estudiantes',profesoras:'Gestión de Profesoras',pagos:'Pagos y Deudas',reportes:'Reportes PDF',config:'Configuración'};
  document.getElementById('pageTitle').textContent=titles[page]||page;
  const c=document.getElementById('mainContent');
  if(page==='resumen') renderResumen(c);
  else if(page==='registro') renderRegistro(c);
  else if(page==='estudiantes') renderEstudiantes(c);
  else if(page==='profesoras') renderProfesoras(c);
  else if(page==='pagos') renderPagos(c);
  else if(page==='reportes') renderReportes(c);
  else if(page==='config') renderConfig(c);
}
window.navigate=navigate;

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmt=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(v);
function getRegistrosHoy(){return (DATA.registros||[]).filter(r=>r.fecha===todayStr())}
function getRegistroEst(estId){return getRegistrosHoy().find(r=>r.estId===estId)}
function getMisGrupos(){
  if(currentUser.role==='profe') return currentUser.grupos||[];
  return DATA.grupos||[];
}
function getMisEstudiantes(){
  const g=getMisGrupos();
  if(currentUser.role==='profe') return (DATA.estudiantes||[]).filter(e=>g.includes(e.grupo));
  return DATA.estudiantes||[];
}

// ─── RESUMEN ──────────────────────────────────────────────────────────────────
function renderResumen(c){
  const ests=getMisEstudiantes();
  const hoy=getRegistrosHoy();
  const asistieron=hoy.filter(r=>r.asistio&&ests.find(e=>e.id===r.estId)).length;
  const almorzaron=hoy.filter(r=>r.almorzó&&ests.find(e=>e.id===r.estId)).length;
  let alertasHTML='';
  if(can.verAlertas()){
    const sinSaldo=(DATA.estudiantes||[]).filter(e=>e.alimentacion!=='no'&&e.alimentacion!=='incluida'&&e.saldoAlmuerzos<=2);
    const deudaMens=(DATA.estudiantes||[]).filter(e=>!e.mensualidadPagada);
    if(sinSaldo.length) alertasHTML+=`<div class="alert alert-yellow">⚠️ <b>${sinSaldo.length} estudiante(s)</b> con saldo bajo: ${sinSaldo.map(e=>e.nombre).join(', ')}</div>`;
    if(deudaMens.length) alertasHTML+=`<div class="alert alert-red">🔴 <b>${deudaMens.length} estudiante(s)</b> con mensualidad pendiente</div>`;
  }
  const grupos={};
  ests.forEach(e=>{
    if(!grupos[e.grupo])grupos[e.grupo]={total:0,asistieron:0,almorzaron:0};
    grupos[e.grupo].total++;
    const reg=getRegistroEst(e.id);
    if(reg&&reg.asistio)grupos[e.grupo].asistieron++;
    if(reg&&reg.almorzó)grupos[e.grupo].almorzaron++;
  });
  c.innerHTML=`${alertasHTML}
  <div class="stats-grid">
    <div class="stat-card"><div class="num">${ests.length}</div><div class="lbl">Estudiantes</div></div>
    <div class="stat-card blue"><div class="num">${asistieron}</div><div class="lbl">Asistieron hoy</div></div>
    <div class="stat-card green"><div class="num">${almorzaron}</div><div class="lbl">Almorzaron hoy</div></div>
    ${can.verFinanciero()?`<div class="stat-card red"><div class="num">${(DATA.estudiantes||[]).filter(e=>!e.mensualidadPagada||e.deudaAlmuerzos>0).length}</div><div class="lbl">Con deudas</div></div>`:''}
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">📋 Resumen por Grupo — Hoy</span></div>
    <table><tr><th>Grupo</th><th>Total</th><th>Asistieron</th><th>Almorzaron</th><th>%</th></tr>
    ${Object.entries(grupos).map(([g,d])=>`<tr>
      <td><span class="badge badge-pink">${g}</span></td><td>${d.total}</td><td>${d.asistieron}</td><td>${d.almorzaron}</td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="saldo-bar" style="width:80px"><div class="saldo-fill" style="width:${d.total?Math.round(d.asistieron/d.total*100):0}%;background:var(--pink)"></div></div>
        ${d.total?Math.round(d.asistieron/d.total*100):0}%
      </div></td>
    </tr>`).join('')}
    </table>
  </div>`;
}

// ─── REGISTRO ─────────────────────────────────────────────────────────────────
function renderRegistro(c){
  const ests=getMisEstudiantes();
  const grupos=[...new Set(ests.map(e=>e.grupo))];
  const selGrupo=window._regGrupo||'todos';
  const filtered=selGrupo==='todos'?ests:ests.filter(e=>e.grupo===selGrupo);
  c.innerHTML=`<div class="card">
    <div class="card-header"><span class="card-title">✅ Registro — ${new Date().toLocaleDateString('es-CO')}</span></div>
    <div style="padding:14px">
      <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
        <label style="font-size:13px;font-weight:600">Grupo:</label>
        <select onchange="window._regGrupo=this.value;navigate('registro')" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e0e0e0;font-size:13px">
          <option value="todos" ${selGrupo==='todos'?'selected':''}>Todos mis grupos</option>
          ${grupos.map(g=>`<option value="${g}" ${selGrupo===g?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>
      <table><tr><th>Estudiante</th><th>Grupo</th><th>Modalidad</th><th>Asistió</th><th>Almorzó</th><th>Estado alimentación</th></tr>
      ${filtered.map(e=>{
        const reg=getRegistroEst(e.id)||{};
        const sc=e.saldoAlmuerzos>3?'var(--green)':e.saldoAlmuerzos>0?'var(--yellow)':'var(--red)';
        return `<tr>
          <td><b>${e.nombre}</b></td>

            `<span style="font-size:12px">Saldo: <b style="color:${sc}">${e.saldoAlmuerzos}</b> días ${e.deudaAlmuerzos>0?`<span class="deuda-chip">⚠️ Debe ${e.deudaAlmuerzos}</span>`:''}</span>`
          }</td>

      }).join('')}

window.toggleReg=function(estId,campo,val){
  const hoy=todayStr();
  if(!DATA.registros) DATA.registros=[];
  let reg=DATA.registros.find(r=>r.estId===estId&&r.fecha===hoy);
  if(!reg){reg={estId,fecha:hoy,asistio:false,'almorzó':false};DATA.registros.push(reg);}
  reg[campo]=val;
  if(campo==='almorzó'){
    const est=(DATA.estudiantes||[]).find(e=>e.id===estId);
    if(est&&est.alimentacion!=='no'&&est.alimentacion!=='incluida'){
      if(val){if(est.saldoAlmuerzos>0)est.saldoAlmuerzos--;else est.deudaAlmuerzos++;}
      else{if(est.deudaAlmuerzos>0)est.deudaAlmuerzos--;else est.saldoAlmuerzos++;}
    }
  }
  save(); navigate('registro');
};

  const n=document.getElementById('mNombre').value.trim();

  if(!DATA.estudiantes)DATA.estudiantes=[];
  if(id){
    const e=DATA.estudiantes.find(x=>x.id===id);
    e.nombre=n;e.grupo=document.getElementById('mGrupo').value;e.modalidad=document.getElementById('mMod').value;
    e.alimentacion=document.getElementById('mAlim').value;e.valorMensualidad=parseInt(document.getElementById('mValM').value)||0;
    e.valorAlmuerzo=parseInt(document.getElementById('mValA').value)||0;e.saldoAlmuerzos=parseInt(document.getElementById('mSaldo').value)||0;
    e.mensualidadPagada=document.getElementById('mMensPag').value==='1';

    DATA.estudiantes.push({id:'e'+Date.now(),nombre:n,grupo:document.getElementById('mGrupo').value,modalidad:document.getElementById('mMod').value,

      deudaAlmuerzos:0,mensualidadPagada:document.getElementById('mMensPag').value==='1'});

  save();document.querySelector('.modal-overlay').remove();navigate('estudiantes');
};

window.deleteEst=function(id){

  const dias=parseInt(document.getElementById('diasRecarga').value);

  e.saldoAlmuerzos+=dias;
  if(!DATA.pagos)DATA.pagos=[];
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'almuerzos',valor:dias*e.valorAlmuerzo,detalle:`Recarga ${dias} almuerzos`});
  save();document.querySelector('.modal-overlay').remove();navigate('pagos');
};
window.pagarDeuda=function(id){
  const e=(DATA.estudiantes||[]).find(x=>x.id===id);
  const html=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
  <div class="modal" style="max-width:380px">
    <div class="modal-header"><span class="modal-title">💰 Pagar deuda</span><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
    <p style="font-size:13px;color:#555;margin-bottom:16px">Estudiante: <b>${e.nombre}</b></p>
    <div style="background:#FFEBEE;border-radius:8px;padding:10px;font-size:13px;color:#C62828;margin-bottom:16px">⚠️ Deuda: <b>${e.deudaAlmuerzos} días</b> = <b>${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)}</b></div>
    <div class="form-group" style="margin-bottom:16px"><label>¿Cuántos días paga?</label>
      <input id="diasDeuda" type="number" min="1" max="${e.deudaAlmuerzos}" placeholder="Máx: ${e.deudaAlmuerzos}"/>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      <button class="btn btn-pink" onclick="confirmarPagoDeuda('${id}')">Confirmar</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
};
window.confirmarPagoDeuda=function(id){
  const dias=parseInt(document.getElementById('diasDeuda').value);
  if(!dias||isNaN(dias)||dias<1)return alert('Ingresa un número válido');
  const e=(DATA.estudiantes||[]).find(x=>x.id===id);
  const pagar=Math.min(dias,e.deudaAlmuerzos);
  e.deudaAlmuerzos-=pagar;
  if(!DATA.pagos)DATA.pagos=[];
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'almuerzos',valor:pagar*e.valorAlmuerzo,detalle:`Pago deuda ${pagar} almuerzos`});
  save();document.querySelector('.modal-overlay').remove();navigate('pagos');
};

  c.innerHTML=`<div class="card" style="padding:24px">
    <div class="card-header" style="margin:-24px -24px 20px -24px;padding:14px 24px"><span class="card-title">📄 Generar Reportes PDF</span></div>
    ${isProfe?`<div class="lock-banner">📋 Solo verás datos de tus grupos: <b>${getMisGrupos().join(', ')}</b></div>`:''}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">
      <div style="background:var(--pink3);border-radius:14px;padding:20px;border:1px solid #f8bbd0">
        <div style="font-size:28px;margin-bottom:8px">📊</div>
        <div style="font-weight:700;font-size:15px;color:var(--blue);margin-bottom:4px">Reporte Diario</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">Asistencia y almuerzos de hoy</div>
        <button class="btn btn-pink" onclick="generarReporte('diario')">Generar</button>
      </div>
      <div style="background:#E3F2FD;border-radius:14px;padding:20px;border:1px solid #bbdefb">
        <div style="font-size:28px;margin-bottom:8px">📅</div>
        <div style="font-weight:700;font-size:15px;color:var(--blue);margin-bottom:4px">Reporte Semanal</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">Resumen de la semana</div>
        <button class="btn btn-pink" onclick="generarReporte('semanal')">Generar</button>
      </div>
      <div style="background:#E8F5E9;border-radius:14px;padding:20px;border:1px solid #c8e6c9">
        <div style="font-size:28px;margin-bottom:8px">🗓️</div>
        <div style="font-weight:700;font-size:15px;color:var(--blue);margin-bottom:4px">Reporte Mensual</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">Resumen del mes</div>
        <button class="btn btn-pink" onclick="generarReporte('mensual')">Generar</button>
      </div>
      ${!isProfe?`
      <div style="background:#FFF3E0;border-radius:14px;padding:20px;border:1px solid #ffe0b2">
        <div style="font-size:28px;margin-bottom:8px">💰</div>
        <div style="font-weight:700;font-size:15px;color:var(--blue);margin-bottom:4px">Reporte Financiero</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">Pagos y deudas</div>
        <button class="btn btn-pink" onclick="generarReporte('financiero')">Generar</button>
      </div>
      <div style="background:#FFEBEE;border-radius:14px;padding:20px;border:1px solid #ffcdd2">
        <div style="font-size:28px;margin-bottom:8px">⚠️</div>
        <div style="font-weight:700;font-size:15px;color:var(--blue);margin-bottom:4px">Reporte de Deudas</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">Lista de deudas pendientes</div>
        <button class="btn btn-pink" onclick="generarReporte('deudas')">Generar</button>
      </div>`:''}
    </div>
  </div>`;
}

window.generarReporte=function(tipo){
  const fecha=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const titles={diario:'REPORTE DIARIO DE ASISTENCIA',semanal:'REPORTE SEMANAL',mensual:'REPORTE MENSUAL',financiero:'REPORTE FINANCIERO',deudas:'REPORTE DE DEUDAS'};
  const ests=getMisEstudiantes();
  let resumenHTML='', tablaHTML='';

  if(tipo==='diario'){
    const hoy=getRegistrosHoy();
    const asist=hoy.filter(r=>r.asistio&&ests.find(e=>e.id===r.estId)).length;
    const alm=hoy.filter(r=>r.almorzó&&ests.find(e=>e.id===r.estId)).length;
    resumenHTML=`<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
      <div style="background:#FCE4EC;border-radius:10px;padding:10px 18px;text-align:center"><div style="font-size:22px;font-weight:700;color:#E91E8C">${ests.length}</div><div style="font-size:11px;color:#888">Total</div></div>
      <div style="background:#E3F2FD;border-radius:10px;padding:10px 18px;text-align:center"><div style="font-size:22px;font-weight:700;color:#1A237E">${asist}</div><div style="font-size:11px;color:#888">Asistieron</div></div>
      <div style="background:#E8F5E9;border-radius:10px;padding:10px 18px;text-align:center"><div style="font-size:22px;font-weight:700;color:#2E7D32">${alm}</div><div style="font-size:11px;color:#888">Almorzaron</div></div>
    </div>`;
    tablaHTML=`<table><thead><tr><th>Estudiante</th><th>Grupo</th><th>Modalidad</th><th>Asistió</th><th>Almorzó</th></tr></thead><tbody>
    ${ests.map(e=>{const r=getRegistroEst(e.id)||{};return`<tr><td>${e.nombre}</td><td>${e.grupo}</td><td>${e.modalidad==='TC'?'T. Completo':'M. Tiempo'}</td><td style="color:${r.asistio?'#2E7D32':'#C62828'}">${r.asistio?'✓ Sí':'✗ No'}</td><td style="color:${r.almorzó?'#2E7D32':'#C62828'}">${e.alimentacion==='no'?'—':r.almorzó?'✓ Sí':'✗ No'}</td></tr>`;}).join('')}
    </tbody></table>`;
  }
  if(tipo==='financiero'){
    tablaHTML=`<table><thead><tr><th>Estudiante</th><th>Grupo</th><th>Mensualidad</th><th>Estado</th><th>Saldo Alm.</th><th>Deuda días</th><th>Valor deuda</th></tr></thead><tbody>
    ${(DATA.estudiantes||[]).map(e=>`<tr><td>${e.nombre}</td><td>${e.grupo}</td><td>${fmt(e.valorMensualidad)}</td><td style="color:${e.mensualidadPagada?'#2E7D32':'#C62828'}">${e.mensualidadPagada?'✅':'❌'}</td><td>${e.alimentacion==='no'?'—':`${e.saldoAlmuerzos}`}</td><td>${e.deudaAlmuerzos}</td><td style="color:${e.deudaAlmuerzos>0?'#C62828':'#2E7D32'}">${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)}</td></tr>`).join('')}
    </tbody></table>`;
  }
  if(tipo==='deudas'){
    const deudores=(DATA.estudiantes||[]).filter(e=>e.deudaAlmuerzos>0||!e.mensualidadPagada);
    tablaHTML=`<table><thead><tr><th>Estudiante</th><th>Grupo</th><th>Deuda Mensualidad</th><th>Deuda Almuerzos</th><th>Total</th></tr></thead><tbody>
    ${deudores.map(e=>`<tr><td>${e.nombre}</td><td>${e.grupo}</td><td>${e.mensualidadPagada?'$0':fmt(e.valorMensualidad)}</td><td>${e.deudaAlmuerzos} días (${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)})</td><td><b style="color:#C62828">${fmt((!e.mensualidadPagada?e.valorMensualidad:0)+(e.deudaAlmuerzos*e.valorAlmuerzo))}</b></td></tr>`).join('')}
    </tbody></table>`;
  }
  if(tipo==='semanal'||tipo==='mensual'){
    const grupos={};
    ests.forEach(e=>{if(!grupos[e.grupo])grupos[e.grupo]={total:0,asistencias:0,almuerzos:0};grupos[e.grupo].total++;});
    (DATA.registros||[]).forEach(r=>{const e=ests.find(x=>x.id===r.estId);if(!e||!grupos[e.grupo])return;if(r.asistio)grupos[e.grupo].asistencias++;if(r.almorzó)grupos[e.grupo].almuerzos++;});
    tablaHTML=`<table><thead><tr><th>Grupo</th><th>Estudiantes</th><th>Asistencias</th><th>Almuerzos</th><th>%</th></tr></thead><tbody>
    ${Object.entries(grupos).map(([g,d])=>`<tr><td>${g}</td><td>${d.total}</td><td>${d.asistencias}</td><td>${d.almuerzos}</td><td>${d.total?Math.round(d.asistencias/d.total*100):0}%</td></tr>`).join('')}
    </tbody></table>`;
  }

  const html=`<div class="modal-overlay" id="reporteModal">
  <div class="modal" style="max-width:800px;width:100%">
    <div class="modal-header">
      <span class="modal-title">📄 ${titles[tipo]}</span>
      <button class="modal-close" onclick="document.getElementById('reporteModal').remove()">✕</button>
    </div>
    <div id="reporteContenido">
      <div style="background:#E91E8C;color:#fff;padding:16px;border-radius:10px;text-align:center;margin-bottom:16px">
        <div style="font-size:16px;font-weight:700">FUNDACIÓN MIS HABILIDADES</div>
        <div style="font-size:11px;opacity:0.9">Fundación de Rehabilitación Integral, Formación y Educación — Ibagué, Tolima</div>
      </div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:700;color:#1A237E">${titles[tipo]}</div>
        <div style="font-size:11px;color:#888">Fecha: ${fecha} | Por: ${currentUser.nombre}</div>
      </div>
      ${resumenHTML}
      <div style="overflow-x:auto">${tablaHTML}</div>
      <div style="margin-top:20px;text-align:center;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px">
        Fundación Mis Habilidades — Ibagué, Tolima | ${new Date().toLocaleString('es-CO')}
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="document.getElementById('reporteModal').remove()">Cerrar</button>
      <button class="btn btn-pink" onclick="imprimirReporte()">🖨️ Imprimir / PDF</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
};

window.imprimirReporte=function(){
  const contenido=document.getElementById('reporteContenido').innerHTML;
  const estilo=`<style>*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;font-size:12px}body{padding:20px}table{width:100%;border-collapse:collapse;margin-top:10px}th{background:#E91E8C;color:#fff;padding:7px 10px;text-align:left}td{padding:7px 10px;border-bottom:1px solid #eee}tr:nth-child(even) td{background:#FCE4EC}</style>`;
  const w=window.open('','_blank','width=900,height=700');
  if(w){w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Reporte FMH</title>${estilo}</head><body>${contenido}</body></html>`);w.document.close();setTimeout(()=>w.print(),500);}
  else window.print();
};

function renderConfig(c){
  c.innerHTML=`
    <div class="lock-banner">🔒 Sección exclusiva del <b>Presidente</b>.</div>
    <div class="card" style="padding:24px">
      <div class="card-header" style="margin:-24px -24px 20px -24px;padding:14px 24px"><span class="card-title">⚙️ Configuración</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px">
        <div style="background:#E8F5E9;border-radius:14px;padding:20px;border:1px solid #c8e6c9">
          <div style="font-size:24px;margin-bottom:8px">🔑</div>
          <div style="font-weight:700;font-size:14px;color:var(--blue);margin-bottom:4px">Contraseña Coordinadora</div>
          <div style="font-size:12px;color:#888;margin-bottom:12px">Usuario: coordinadora</div>
          <input id="newCoordPass" type="password" placeholder="Nueva contraseña" style="width:100%;padding:8px;border-radius:8px;border:1.5px solid #e0e0e0;font-size:13px;margin-bottom:8px"/>
          <button class="btn btn-green" onclick="cambiarPassCoord()">Actualizar</button>
        </div>
        <div style="background:var(--pink3);border-radius:14px;padding:20px;border:1px solid #f8bbd0">
          <div style="font-size:24px;margin-bottom:8px">🏫</div>
          <div style="font-weight:700;font-size:14px;color:var(--blue);margin-bottom:4px">Gestión de Grupos</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">
            ${(DATA.grupos||[]).map(g=>`<span class="badge badge-pink" style="margin:2px">${g} <span onclick="eliminarGrupo('${g}')" style="cursor:pointer;margin-left:4px">✕</span></span>`).join('')}
          </div>
          <button class="btn btn-pink" onclick="agregarGrupo()">+ Agregar grupo</button>
        </div>
        <div style="background:#FFEBEE;border-radius:14px;padding:20px;border:1px solid #ffcdd2">
          <div style="font-size:24px;margin-bottom:8px">🔄</div>
          <div style="font-weight:700;font-size:14px;color:var(--blue);margin-bottom:4px">Reiniciar mensualidades</div>
          <div style="font-size:12px;color:#888;margin-bottom:12px">Marca todas como pendientes para el nuevo mes</div>
          <button class="btn btn-red" onclick="reiniciarMensualidades()">Reiniciar mes</button>
        </div>
      </div>
    </div>`;
}

window.cambiarPassCoord=function(){
  const np=document.getElementById('newCoordPass').value.trim();
  if(!np||np.length<6)return alert('Mínimo 6 caracteres');
  COORD_CRED.pass=np;
  alert('✅ Contraseña actualizada');
  document.getElementById('newCoordPass').value='';
};
window.agregarGrupo=function(){
  const g=prompt('Nombre del nuevo grupo:');
  if(!g||!g.trim())return;
  if(!DATA.grupos)DATA.grupos=[];
  if(DATA.grupos.includes(g.trim().toUpperCase()))return alert('Ese grupo ya existe');
  DATA.grupos.push(g.trim().toUpperCase());
  save();navigate('config');
};
window.eliminarGrupo=function(g){
  if(!confirm(`¿Eliminar el grupo "${g}"?`))return;
  DATA.grupos=(DATA.grupos||[]).filter(x=>x!==g);
  save();navigate('config');
};
window.reiniciarMensualidades=function(){
  if(!confirm('¿Marcar TODAS las mensualidades como pendientes?'))return;
  (DATA.estudiantes||[]).forEach(e=>e.mensualidadPagada=false);
  save();alert('✅ Mensualidades reiniciadas');navigate('config');
};

</script>
