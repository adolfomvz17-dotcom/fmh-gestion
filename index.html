<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fundación Mis Habilidades — Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{--pink:#E91E8C;--pink2:#F48FB1;--pink3:#FCE4EC;--blue:#1A237E;--green:#2E7D32;--red:#C62828;--yellow:#F9A825;--gray:#f5f5f5;--border:#e0e0e0}
body{background:#f9f9f9;color:#333}
.hidden{display:none!important}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FCE4EC,#E91E8C22)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px #E91E8C22;text-align:center}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{color:var(--pink);font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:#888;font-size:12px;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--pink)}
.btn-login{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.login-hint{font-size:11px;color:#aaa;margin-top:8px}

/* LAYOUT */
#app{display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,var(--pink),#c2185b);color:#fff;padding:0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.sidebar-logo-text{font-size:13px;font-weight:700;line-height:1.3}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;transition:background 0.15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.15)}
.nav-item.active{background:rgba(255,255,255,0.25);border-left-color:#fff}
.nav-item .ico{font-size:18px;width:24px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.2);font-size:11px;opacity:0.8}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:18px;font-weight:700;color:var(--blue)}
.topbar-info{display:flex;align-items:center;gap:12px;font-size:13px;color:#666}
.badge-role{background:var(--pink3);color:var(--pink);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.btn-salir{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#666}
.content{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:16px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:32px;font-weight:700;color:var(--pink)}
.stat-card .lbl{font-size:11px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card.blue .num{color:var(--blue)}
.stat-card.green .num{color:var(--green)}
.stat-card.yellow .num{color:var(--yellow)}
.stat-card.red .num{color:var(--red)}

/* TABLES */
.card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--pink3)}
.card-title{font-size:14px;font-weight:700;color:var(--blue)}
table{width:100%;border-collapse:collapse}
th{background:#f8f8f8;padding:10px 14px;text-align:left;font-size:12px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#E8F5E9;color:var(--green)}
.badge-red{background:#FFEBEE;color:var(--red)}
.badge-yellow{background:#FFFDE7;color:var(--yellow)}
.badge-pink{background:var(--pink3);color:var(--pink)}
.badge-blue{background:#E3F2FD;color:var(--blue)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-pink{background:var(--pink);color:#fff}
.btn-pink:hover{background:#c2185b}
.btn-outline{background:none;border:1.5px solid var(--pink);color:var(--pink)}
.btn-red{background:#FFEBEE;color:var(--red);border:none}
.btn-green{background:#E8F5E9;color:var(--green);border:none}
.btn-blue{background:#E3F2FD;color:var(--blue);border:none}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:#555}
.form-group input,.form-group select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--pink)}
.form-full{grid-column:1/-1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--blue)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa}

/* SALDO */
.saldo-bar{height:8px;border-radius:20px;background:#eee;overflow:hidden;margin-top:4px}
.saldo-fill{height:100%;border-radius:20px;transition:width 0.3s}

/* ALERTS */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-red{background:#FFEBEE;color:var(--red);border-left:4px solid var(--red)}
.alert-yellow{background:#FFFDE7;color:#795548;border-left:4px solid var(--yellow)}
.alert-green{background:#E8F5E9;color:var(--green);border-left:4px solid var(--green)}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#888}
.tab-btn.active{background:var(--pink);color:#fff;border-color:var(--pink)}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--pink)}

/* DEUDA */
.deuda-chip{display:inline-flex;align-items:center;gap:4px;background:#FFEBEE;color:var(--red);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}

/* RESPONSIVE */
@media(max-width:700px){
  .sidebar{width:60px}
  .sidebar-logo-text,.nav-item span,.sidebar-footer{display:none}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🌸</div>
    <div class="login-title">Mis Habilidades</div>
    <div class="login-sub">Fundación de Rehabilitación Integral</div>
    <input id="loginUser" placeholder="Usuario" />
    <input id="loginPass" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()" />
    <p id="loginErr" style="color:#E91E8C;font-size:12px;margin-bottom:8px;display:none">Usuario o contraseña incorrectos</p>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-hint">Ingresa tus credenciales de acceso</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🌸</div>
      <div class="sidebar-logo-text">Fundación<br>Mis Habilidades</div>
    </div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-footer">© 2026 FMH Ibagué</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Resumen</div>
      <div class="topbar-info">
        <span id="todayDate"></span>
        <span class="badge-role" id="roleLabel"></span>
        <span id="userLabel" style="font-weight:600"></span>
        <button class="btn-salir" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const ADMIN_CRED = {id:'admin', pass:'Admin2025', role:'admin', nombre:'Coordinadora'};

function getUsers(){
  const profes = DATA.profesoras
    .filter(p => p.usuario && p.password)
    .map(p => ({id: p.usuario, pass: p.password, role:'profe', nombre: p.nombre, grupo: p.grupo}));
  return [ADMIN_CRED, ...profes];
}
const USERS = null; // reemplazado por getUsers()

let DATA = JSON.parse(localStorage.getItem('fmh_data')||'null') || {
  grupos: ['BABYLAND','TODDLERS','KINDER 3','KINDER 4','TRANSITION','FIRST','SECOND','THIRD','FOURTH','FIFTH','UAI'],
  profesoras: [
    {id:'p1',nombre:'Ana García',grupo:'TRANSITION',usuario:'profe1'},
    {id:'p2',nombre:'María López',grupo:'FIRST',usuario:'profe2'},
  ],
  estudiantes: [
    {id:'e1',nombre:'Sofía Martínez',grupo:'TRANSITION',modalidad:'TC',alimentacion:'incluida',valorMensualidad:350000,valorAlmuerzo:8000,saldoAlmuerzos:5,deudaAlmuerzos:0,mensualidadPagada:true},
    {id:'e2',nombre:'Juan Pérez',grupo:'TRANSITION',modalidad:'MT',alimentacion:'dia',valorMensualidad:200000,valorAlmuerzo:7000,saldoAlmuerzos:0,deudaAlmuerzos:3,mensualidadPagada:false},
    {id:'e3',nombre:'Laura Gómez',grupo:'FIRST',modalidad:'TC',alimentacion:'no',valorMensualidad:300000,valorAlmuerzo:8000,saldoAlmuerzos:0,deudaAlmuerzos:0,mensualidadPagada:true},
    {id:'e4',nombre:'Carlos Ruiz',grupo:'FIRST',modalidad:'TC',alimentacion:'incluida',valorMensualidad:380000,valorAlmuerzo:9000,saldoAlmuerzos:2,deudaAlmuerzos:0,mensualidadPagada:true},
  ],
  registros: [],
  pagos: [],
};

function save(){localStorage.setItem('fmh_data',JSON.stringify(DATA))}

let currentUser = null;
let currentPage = 'resumen';

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const found=USERS.find(x=>x.id===u&&x.pass===p);
  if(!found){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  currentUser=found;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('roleLabel').textContent=found.role==='admin'?'Administrador':'Profesora';
  document.getElementById('userLabel').textContent=found.nombre;
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  buildNav();
  navigate('resumen');
}
function doLogout(){
  currentUser=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
const NAV_ADMIN=[
  {id:'resumen',ico:'📊',label:'Resumen'},
  {id:'registro',ico:'✅',label:'Registro Diario'},
  {id:'estudiantes',ico:'👦',label:'Estudiantes'},
  {id:'profesoras',ico:'👩‍🏫',label:'Profesoras'},
  {id:'pagos',ico:'💰',label:'Pagos y Deudas'},
  {id:'reportes',ico:'📄',label:'Reportes PDF'},
];
const NAV_PROFE=[
  {id:'resumen',ico:'📊',label:'Resumen'},
  {id:'registro',ico:'✅',label:'Registro Diario'},
  {id:'reportes',ico:'📄',label:'Mis Reportes'},
];

function buildNav(){
  const nav=document.getElementById('sideNav');
  const items=currentUser.role==='admin'?NAV_ADMIN:NAV_PROFE;
  nav.innerHTML=items.map(i=>`<div class="nav-item" id="nav_${i.id}" onclick="navigate('${i.id}')"><span class="ico">${i.ico}</span><span>${i.label}</span></div>`).join('');
}
function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav_'+page);
  if(el)el.classList.add('active');
  const titles={resumen:'Resumen del Día',registro:'Registro Diario',estudiantes:'Gestión de Estudiantes',profesoras:'Gestión de Profesoras',pagos:'Pagos y Deudas',reportes:'Reportes PDF'};
  document.getElementById('pageTitle').textContent=titles[page]||page;
  const content=document.getElementById('mainContent');
  if(page==='resumen') renderResumen(content);
  else if(page==='registro') renderRegistro(content);
  else if(page==='estudiantes') renderEstudiantes(content);
  else if(page==='profesoras') renderProfesoras(content);
  else if(page==='pagos') renderPagos(content);
  else if(page==='reportes') renderReportes(content);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmt=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(v);
function getRegistrosHoy(){return DATA.registros.filter(r=>r.fecha===todayStr())}
function getRegistroEst(estId){return getRegistrosHoy().find(r=>r.estId===estId)}

// ─── RESUMEN ──────────────────────────────────────────────────────────────────
function renderResumen(c){
  const hoy=getRegistrosHoy();
  const asistieron=hoy.filter(r=>r.asistio).length;
  const almorzaron=hoy.filter(r=>r.almorzó).length;
  const total=DATA.estudiantes.length;
  const deudores=currentUser.role==='admin'?DATA.estudiantes.filter(e=>e.deudaAlmuerzos>0||!e.mensualidadPagada):[];

  let alertasHTML='';
  if(currentUser.role==='admin'){
    const sinSaldo=DATA.estudiantes.filter(e=>e.alimentacion!=='no'&&e.saldoAlmuerzos<=2&&e.alimentacion!=='incluida');
    const deudaMens=DATA.estudiantes.filter(e=>!e.mensualidadPagada);
    if(sinSaldo.length) alertasHTML+=`<div class="alert alert-yellow">⚠️ <b>${sinSaldo.length} estudiante(s)</b> con saldo de almuerzos bajo o en cero: ${sinSaldo.map(e=>e.nombre).join(', ')}</div>`;
    if(deudaMens.length) alertasHTML+=`<div class="alert alert-red">🔴 <b>${deudaMens.length} estudiante(s)</b> con mensualidad pendiente este mes</div>`;
  }

  // resumen por grupo
  const grupos={};
  DATA.estudiantes.forEach(e=>{
    if(!grupos[e.grupo])grupos[e.grupo]={total:0,asistieron:0,almorzaron:0};
    grupos[e.grupo].total++;
    const reg=getRegistroEst(e.id);
    if(reg&&reg.asistio)grupos[e.grupo].asistieron++;
    if(reg&&reg.almorzó)grupos[e.grupo].almorzaron++;
  });

  c.innerHTML=`
    ${alertasHTML}
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Estudiantes</div></div>
      <div class="stat-card blue"><div class="num">${asistieron}</div><div class="lbl">Asistieron hoy</div></div>
      <div class="stat-card green"><div class="num">${almorzaron}</div><div class="lbl">Almorzaron hoy</div></div>
      <div class="stat-card"><div class="num">${DATA.grupos.length}</div><div class="lbl">Grupos</div></div>
      ${currentUser.role==='admin'?`<div class="stat-card red"><div class="num">${deudores.length}</div><div class="lbl">Con deudas</div></div>`:''}
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">📋 Resumen por Grupo — Hoy</span></div>
      <table>
        <tr><th>Grupo</th><th>Total</th><th>Asistieron</th><th>Almorzaron</th><th>Asistencia %</th></tr>
        ${Object.entries(grupos).map(([g,d])=>`
          <tr>
            <td><span class="badge badge-pink">${g}</span></td>
            <td>${d.total}</td>
            <td>${d.asistieron}</td>
            <td>${d.almorzaron}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="saldo-bar" style="width:80px"><div class="saldo-fill" style="width:${d.total?Math.round(d.asistieron/d.total*100):0}%;background:var(--pink)"></div></div>
                ${d.total?Math.round(d.asistieron/d.total*100):0}%
              </div>
            </td>
          </tr>`).join('')}
      </table>
    </div>`;
}

// ─── REGISTRO ─────────────────────────────────────────────────────────────────
function renderRegistro(c){
  const grupo=currentUser.role==='profe'?currentUser.grupo:null;
  let ests=DATA.estudiantes;
  if(grupo) ests=ests.filter(e=>e.grupo===grupo);

  // filtro grupo para admin
  const grupos=[...new Set(DATA.estudiantes.map(e=>e.grupo))];
  const selGrupo=window._regGrupo||'todos';

  if(currentUser.role==='admin'){
    ests=selGrupo==='todos'?DATA.estudiantes:DATA.estudiantes.filter(e=>e.grupo===selGrupo);
  }

  c.innerHTML=`
    <div class="card">
      <div class="card-header">
        <span class="card-title">✅ Registro del día — ${new Date().toLocaleDateString('es-CO')}</span>
      </div>
      <div style="padding:14px">
        ${currentUser.role==='admin'?`
        <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
          <label style="font-size:13px;font-weight:600">Filtrar grupo:</label>
          <select onchange="window._regGrupo=this.value;navigate('registro')" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e0e0e0;font-size:13px">
            <option value="todos" ${selGrupo==='todos'?'selected':''}>Todos</option>
            ${grupos.map(g=>`<option value="${g}" ${selGrupo===g?'selected':''}>${g}</option>`).join('')}
          </select>
        </div>`:''}
        <table>
          <tr><th>Estudiante</th><th>Grupo</th><th>Modalidad</th><th>Asistió</th><th>Almorzó</th><th>Estado alimentación</th></tr>
          ${ests.map(e=>{
            const reg=getRegistroEst(e.id)||{};
            const asistio=reg.asistio||false;
            const almorzó=reg.almorzó||false;
            const saldoColor=e.saldoAlmuerzos>3?'var(--green)':e.saldoAlmuerzos>0?'var(--yellow)':'var(--red)';
            return `<tr>
              <td><b>${e.nombre}</b></td>
              <td><span class="badge badge-pink">${e.grupo}</span></td>
              <td><span class="badge badge-blue">${e.modalidad==='TC'?'T. Completo':'M. Tiempo'}</span></td>
              <td>
                <input type="checkbox" ${asistio?'checked':''} onchange="toggleReg('${e.id}','asistio',this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--pink)"/>
              </td>
              <td>
                ${e.alimentacion==='no'?'<span style="color:#aaa;font-size:12px">No aplica</span>':`
                <input type="checkbox" ${almorzó?'checked':''} onchange="toggleReg('${e.id}','almorzó',this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--green)"/>
                `}
              </td>
              <td>
                ${e.alimentacion==='no'?'<span class="badge badge-blue">Sin alimentación</span>':
                  e.alimentacion==='incluida'?'<span class="badge badge-green">Incluida</span>':
                  `<span style="font-size:12px">Saldo: <b style="color:${saldoColor}">${e.saldoAlmuerzos}</b> almuerzos
                  ${e.deudaAlmuerzos>0?`<span class="deuda-chip">⚠️ Debe ${e.deudaAlmuerzos} días</span>`:''}</span>`
                }
              </td>
            </tr>`;
          }).join('')}
        </table>
      </div>
    </div>`;
}

function toggleReg(estId,campo,val){
  const hoy=todayStr();
  let reg=DATA.registros.find(r=>r.estId===estId&&r.fecha===hoy);
  if(!reg){reg={estId,fecha:hoy,asistio:false,'almorzó':false};DATA.registros.push(reg);}
  reg[campo]=val;
  // si almorzó, descontar saldo o sumar deuda
  if(campo==='almorzó'){
    const est=DATA.estudiantes.find(e=>e.id===estId);
    if(est&&est.alimentacion!=='no'&&est.alimentacion!=='incluida'){
      if(val){
        if(est.saldoAlmuerzos>0) est.saldoAlmuerzos--;
        else est.deudaAlmuerzos++;
      } else {
        // desmarcar: revertir
        const prevDeuda=est.deudaAlmuerzos;
        if(prevDeuda>0) est.deudaAlmuerzos--;
        else est.saldoAlmuerzos++;
      }
    }
  }
  save();
  navigate('registro');
}

function pagarMens(id){
  const e=DATA.estudiantes.find(x=>x.id===id);
  e.mensualidadPagada=true;
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'mensualidad',valor:e.valorMensualidad,detalle:`Mensualidad ${new Date().toLocaleDateString('es-CO',{month:'long',year:'numeric'})}`});
  save(); navigate('pagos');
}

function recargarAlm(id){
  const e=DATA.estudiantes.find(x=>x.id===id);
  const dias=parseInt(prompt(`¿Cuántos días de almuerzo recargar para ${e.nombre}?\n(1=1 día, 5=semana, 20=mes)`));
  if(!dias||isNaN(dias))return;
  e.saldoAlmuerzos+=dias;
  const valor=dias*e.valorAlmuerzo;
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'almuerzos',valor,detalle:`Recarga de ${dias} almuerzos`});
  save(); navigate('pagos');
}

function pagarDeuda(id){
  const e=DATA.estudiantes.find(x=>x.id===id);
  const dias=parseInt(prompt(`${e.nombre} debe ${e.deudaAlmuerzos} días (${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)})\n¿Cuántos días paga ahora?`));
  if(!dias||isNaN(dias))return;
  const pagar=Math.min(dias,e.deudaAlmuerzos);
  const valor=pagar*e.valorAlmuerzo;
  e.deudaAlmuerzos-=pagar;
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'almuerzos',valor,detalle:`Pago de deuda: ${pagar} almuerzos`});
  save(); navigate('pagos');
}

function generarPDF(tipo){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const fecha=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Header
  doc.setFillColor(233,30,140);
  doc.rect(0,0,210,30,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('FUNDACIÓN MIS HABILIDADES',105,12,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Fundación de Rehabilitación Integral, Formación y Educación',105,20,{align:'center'});
  doc.setFontSize(9);
  doc.text('Ibagué, Tolima, Colombia',105,27,{align:'center'});

  doc.setTextColor(0,0,0);
  doc.setFontSize(14);doc.setFont('helvetica','bold');

  const titles={diario:'REPORTE DIARIO DE ASISTENCIA',semanal:'REPORTE SEMANAL',mensual:'REPORTE MENSUAL',financiero:'REPORTE FINANCIERO',deudas:'REPORTE DE DEUDAS'};
  doc.text(titles[tipo],105,42,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.setTextColor(100,100,100);
  doc.text(`Fecha: ${fecha}`,105,50,{align:'center'});
  doc.text(`Generado por: ${currentUser.nombre}`,105,56,{align:'center'});

  let y=66;

  if(tipo==='diario'){
    const hoy=getRegistrosHoy();
    const asist=hoy.filter(r=>r.asistio).length;
    const alm=hoy.filter(r=>r.almorzó).length;
    doc.setTextColor(0,0,0);
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text(`Total estudiantes: ${DATA.estudiantes.length}  |  Asistieron: ${asist}  |  Almorzaron: ${alm}`,14,y);
    y+=10;
    doc.autoTable({
      startY:y,
      head:[['Estudiante','Grupo','Asistió','Almorzó']],
      body:DATA.estudiantes.map(e=>{const r=getRegistroEst(e.id)||{};return[e.nombre,e.grupo,r.asistio?'✓ Sí':'✗ No',e.alimentacion==='no'?'N/A':r.almorzó?'✓ Sí':'✗ No'];}),
      headStyles:{fillColor:[233,30,140]},
      alternateRowStyles:{fillColor:[252,228,236]},
    });
  }

  if(tipo==='financiero'){
    doc.autoTable({
      startY:y,
      head:[['Estudiante','Grupo','Mensualidad','Estado','Saldo Alm.','Deuda Alm.','Valor Deuda']],
      body:DATA.estudiantes.map(e=>[e.nombre,e.grupo,fmt(e.valorMensualidad),e.mensualidadPagada?'Pagada':'Pendiente',e.alimentacion==='no'?'N/A':`${e.saldoAlmuerzos} días`,`${e.deudaAlmuerzos} días`,fmt(e.deudaAlmuerzos*e.valorAlmuerzo)]),
      headStyles:{fillColor:[233,30,140]},
      alternateRowStyles:{fillColor:[252,228,236]},
    });
  }

  if(tipo==='deudas'){
    const deudores=DATA.estudiantes.filter(e=>e.deudaAlmuerzos>0||!e.mensualidadPagada);
    doc.autoTable({
      startY:y,
      head:[['Estudiante','Grupo','Deuda Mensualidad','Deuda Almuerzos','Total Deuda']],
      body:deudores.map(e=>[e.nombre,e.grupo,e.mensualidadPagada?'$0':fmt(e.valorMensualidad),`${e.deudaAlmuerzos} días (${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)})`,fmt((!e.mensualidadPagada?e.valorMensualidad:0)+(e.deudaAlmuerzos*e.valorAlmuerzo))]),
      headStyles:{fillColor:[198,40,40]},
      alternateRowStyles:{fillColor:[255,235,238]},
    });
  }

  if(tipo==='semanal'||tipo==='mensual'){
    const grupos={};
    DATA.estudiantes.forEach(e=>{
      if(!grupos[e.grupo])grupos[e.grupo]={total:0,asistencias:0,almuerzos:0};
      grupos[e.grupo].total++;
    });
    DATA.registros.forEach(r=>{
      const e=DATA.estudiantes.find(x=>x.id===r.estId);
      if(!e)return;
      if(!grupos[e.grupo])return;
      if(r.asistio)grupos[e.grupo].asistencias++;
      if(r.almorzó)grupos[e.grupo].almuerzos++;
    });
    doc.autoTable({
      startY:y,
      head:[['Grupo','Estudiantes','Total Asistencias','Total Almuerzos','% Promedio']],
      body:Object.entries(grupos).map(([g,d])=>[g,d.total,d.asistencias,d.almuerzos,d.total?`${Math.round(d.asistencias/d.total*100)}%`:'0%']),
      headStyles:{fillColor:[233,30,140]},
      alternateRowStyles:{fillColor:[252,228,236]},
    });
  }

  // Footer
  const pCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pCount;i++){
    doc.setPage(i);
    doc.setFontSize(8);doc.setTextColor(150,150,150);
    doc.text(`Fundación Mis Habilidades — Ibagué, Tolima | Página ${i} de ${pCount}`,105,287,{align:'center'});
  }

  doc.save(`FMH_${tipo}_${todayStr()}.pdf`);
}
</script>
</body>
</html>
