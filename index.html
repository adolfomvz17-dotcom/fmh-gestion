<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA9PVOIOgPUH6n032V3k-I4RpibUBZBujw",
    authDomain: "fmh-mishabilidades.firebaseapp.com",
    projectId: "fmh-mishabilidades",
    storageBucket: "fmh-mishabilidades.firebasestorage.app",
    messagingSenderId: "124208084513",
    appId: "1:124208084513:web:fff3ca5ff599ff4f48d560",
    measurementId: "G-0TFMJZYBCW"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._fbModules = { doc, setDoc, getDoc, collection, getDocs };

  // Cargar datos desde Firebase
  async function cargarDatos() {
    try {
      const snap = await getDoc(doc(db, 'fmh', 'data'));
      if (snap.exists()) {
        window.DATA = snap.data();
      }
    } catch(e) {
      console.log('Usando datos locales:', e);
    }
  }

  // Guardar datos en Firebase
  window.saveFirebase = async function() {
    try {
      const { doc, setDoc } = window._fbModules;
      await setDoc(doc(window._db, 'fmh', 'data'), window.DATA);
    } catch(e) {
      console.log('Error guardando en Firebase:', e);
    }
  };

  await cargarDatos();
  window._firebaseReady = true;
  if (window._initApp) window._initApp();
</script>
<style>

.lock-banner{background:#EDE7F6;border:1px solid #B39DDB;border-radius:10px;padding:12px 16px;font-size:13px;color:#4527A0;margin-bottom:16px;display:flex;align-items:center;gap:10px}

<body>

<div id="loginScreen">
  <div class="login-box">

    <p id="loginErr" style="color:#E91E8C;font-size:12px;margin-bottom:8px;display:none">Usuario o contraseña incorrectos</p>

    <p style="font-size:11px;color:#ccc;margin-top:8px">Ibagué, Tolima — Colombia</p>
  </div>
</div>

<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🌸</div>
      <div class="sidebar-logo-text">Fundación<br>Mis Habilidades</div>
    </div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-footer">© 2026 FMH Ibagué</div>

      <div class="topbar-info">
        <span id="todayDate"></span>
        <span class="badge-role" id="roleLabel"></span>
        <span id="userLabel" style="font-weight:600"></span>
        <button class="btn-salir" onclick="doLogout()">Salir</button>
      </div>

<script>
// ─── CREDENCIALES FIJAS ───────────────────────────────────────────────────────
const ADMIN_CRED  = {id:'admin',        pass:'Admin2025',  role:'admin',  nombre:'Presidente'};
const COORD_CRED  = {id:'coordinadora', pass:'Coord2025',  role:'coord',  nombre:'Coordinadora'};

function getUsers(){
  const profes = DATA.profesoras
    .filter(p=>p.usuario&&p.password)
    .map(p=>({id:p.usuario,pass:p.password,role:'profe',nombre:p.nombre,grupo:p.grupo}));
  return [ADMIN_CRED, COORD_CRED, ...profes];
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
let DATA = JSON.parse(localStorage.getItem('fmh_data2')||'null') || {
  grupos:['BABYLAND','TODDLERS','KINDER 3','KINDER 4','TRANSITION','FIRST','SECOND','THIRD','FOURTH','FIFTH','UAI'],
  profesoras:[
    {id:'p1',nombre:'Ana García',grupo:'TRANSITION',usuario:'ana.garcia',password:'Profe2025'},
    {id:'p2',nombre:'María López',grupo:'FIRST',usuario:'maria.lopez',password:'Profe2025'},
  ],
  estudiantes:[
    {id:'e1',nombre:'Sofía Martínez',grupo:'TRANSITION',modalidad:'TC',alimentacion:'incluida',valorMensualidad:350000,valorAlmuerzo:8000,saldoAlmuerzos:5,deudaAlmuerzos:0,mensualidadPagada:true},
    {id:'e2',nombre:'Juan Pérez',grupo:'TRANSITION',modalidad:'MT',alimentacion:'dia',valorMensualidad:200000,valorAlmuerzo:7000,saldoAlmuerzos:0,deudaAlmuerzos:3,mensualidadPagada:false},
    {id:'e3',nombre:'Laura Gómez',grupo:'FIRST',modalidad:'TC',alimentacion:'no',valorMensualidad:300000,valorAlmuerzo:8000,saldoAlmuerzos:0,deudaAlmuerzos:0,mensualidadPagada:true},
    {id:'e4',nombre:'Carlos Ruiz',grupo:'FIRST',modalidad:'TC',alimentacion:'incluida',valorMensualidad:380000,valorAlmuerzo:9000,saldoAlmuerzos:2,deudaAlmuerzos:0,mensualidadPagada:true},
  ],
  registros:[],
  pagos:[],
};
function save(){
  localStorage.setItem('fmh_data2', JSON.stringify(DATA));
  if (window.saveFirebase) window.saveFirebase();
}

let currentUser=null, currentPage='resumen';

// ─── PERMISOS ─────────────────────────────────────────────────────────────────
const can = {
  eliminarEstudiante: ()=> currentUser?.role==='admin',
  eliminarProfesora:  ()=> currentUser?.role==='admin',
  cambiarCredenciales:()=> currentUser?.role==='admin',
  verFinanciero:      ()=> ['admin','coord'].includes(currentUser?.role),
  registrarPagos:     ()=> ['admin','coord'].includes(currentUser?.role),
  agregarEstudiante:  ()=> ['admin','coord'].includes(currentUser?.role),
  editarEstudiante:   ()=> ['admin','coord'].includes(currentUser?.role),
  verAlertas:         ()=> ['admin','coord'].includes(currentUser?.role),
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const found=getUsers().find(x=>x.id===u&&x.pass===p);
  if(!found){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  currentUser=found;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const roleNames={admin:'Presidente',coord:'Coordinadora',profe:'Profesora'};
  const roleClasses={admin:'role-admin',coord:'role-coord',profe:'role-profe'};
  const rl=document.getElementById('roleLabel');
  rl.textContent=roleNames[found.role];
  rl.className='badge-role '+roleClasses[found.role];
  document.getElementById('userLabel').textContent=found.nombre;
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  buildNav(); navigate('resumen');
}
function doLogout(){
  currentUser=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function buildNav(){
  const nav=document.getElementById('sideNav');
  const r=currentUser.role;
  let items=[];
  if(r==='admin'||r==='coord'){
    items=[
      {section:'General'},
      {id:'resumen',ico:'📊',label:'Resumen'},
      {id:'registro',ico:'✅',label:'Registro Diario'},
      {section:'Gestión'},
      {id:'estudiantes',ico:'👦',label:'Estudiantes'},
      {id:'profesoras',ico:'👩‍🏫',label:'Profesoras'},
      {section:'Finanzas'},
      {id:'pagos',ico:'💰',label:'Pagos y Deudas'},
      {id:'reportes',ico:'📄',label:'Reportes PDF'},
    ];
    if(r==='admin') items.push({section:'Configuración'},{id:'config',ico:'⚙️',label:'Configuración'});
  } else {
    items=[
      {id:'resumen',ico:'📊',label:'Resumen'},
      {id:'registro',ico:'✅',label:'Registro Diario'},
      {id:'reportes',ico:'📄',label:'Mis Reportes'},
    ];
  }
  nav.innerHTML=items.map(i=>i.section
    ?`<div class="nav-section">${i.section}</div>`
    :`<div class="nav-item" id="nav_${i.id}" onclick="navigate('${i.id}')"><span class="ico">${i.ico}</span><span>${i.label}</span></div>`
  ).join('');
}

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav_'+page);
  if(el)el.classList.add('active');
  const titles={resumen:'Resumen del Día',registro:'Registro Diario',estudiantes:'Gestión de Estudiantes',profesoras:'Gestión de Profesoras',pagos:'Pagos y Deudas',reportes:'Reportes PDF',config:'Configuración'};
  document.getElementById('pageTitle').textContent=titles[page]||page;
  const c=document.getElementById('mainContent');
  if(page==='resumen') renderResumen(c);
  else if(page==='registro') renderRegistro(c);
  else if(page==='estudiantes') renderEstudiantes(c);
  else if(page==='profesoras') renderProfesoras(c);
  else if(page==='pagos') renderPagos(c);
  else if(page==='reportes') renderReportes(c);
  else if(page==='config') renderConfig(c);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmt=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(v);
function getRegistrosHoy(){return DATA.registros.filter(r=>r.fecha===todayStr())}
function getRegistroEst(estId){return getRegistrosHoy().find(r=>r.estId===estId)}

// ─── RESUMEN ──────────────────────────────────────────────────────────────────
function renderResumen(c){
  const hoy=getRegistrosHoy();
  const asistieron=hoy.filter(r=>r.asistio).length;
  const almorzaron=hoy.filter(r=>r.almorzó).length;
  const total=DATA.estudiantes.length;

  let alertasHTML='';
  if(can.verAlertas()){
    const sinSaldo=DATA.estudiantes.filter(e=>e.alimentacion!=='no'&&e.alimentacion!=='incluida'&&e.saldoAlmuerzos<=2);
    const deudaMens=DATA.estudiantes.filter(e=>!e.mensualidadPagada);
    const conDeudaAlm=DATA.estudiantes.filter(e=>e.deudaAlmuerzos>0);
    if(sinSaldo.length) alertasHTML+=`<div class="alert alert-yellow">⚠️ <b>${sinSaldo.length} estudiante(s)</b> con saldo bajo o en cero: ${sinSaldo.map(e=>e.nombre).join(', ')}</div>`;
    if(deudaMens.length) alertasHTML+=`<div class="alert alert-red">🔴 <b>${deudaMens.length} estudiante(s)</b> con mensualidad pendiente</div>`;
    if(conDeudaAlm.length) alertasHTML+=`<div class="alert alert-red">🍽️ <b>${conDeudaAlm.length} estudiante(s)</b> con deuda de almuerzos</div>`;
  }

  const grupos={};
  DATA.estudiantes.forEach(e=>{
    if(!grupos[e.grupo])grupos[e.grupo]={total:0,asistieron:0,almorzaron:0};
    grupos[e.grupo].total++;
    const reg=getRegistroEst(e.id);
    if(reg&&reg.asistio)grupos[e.grupo].asistieron++;
    if(reg&&reg.almorzó)grupos[e.grupo].almorzaron++;
  });

  c.innerHTML=`
    ${alertasHTML}
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Estudiantes</div></div>
      <div class="stat-card blue"><div class="num">${asistieron}</div><div class="lbl">Asistieron hoy</div></div>
      <div class="stat-card green"><div class="num">${almorzaron}</div><div class="lbl">Almorzaron hoy</div></div>
      <div class="stat-card"><div class="num">${DATA.grupos.length}</div><div class="lbl">Grupos</div></div>
      ${can.verFinanciero()?`<div class="stat-card red"><div class="num">${DATA.estudiantes.filter(e=>!e.mensualidadPagada||e.deudaAlmuerzos>0).length}</div><div class="lbl">Con deudas</div></div>`:''}
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">📋 Resumen por Grupo — Hoy</span></div>
      <table>
        <tr><th>Grupo</th><th>Total</th><th>Asistieron</th><th>Almorzaron</th><th>Asistencia %</th></tr>
        ${Object.entries(grupos).map(([g,d])=>`<tr>
          <td><span class="badge badge-pink">${g}</span></td>
          <td>${d.total}</td><td>${d.asistieron}</td><td>${d.almorzaron}</td>
          <td><div style="display:flex;align-items:center;gap:8px">
            <div class="saldo-bar" style="width:80px"><div class="saldo-fill" style="width:${d.total?Math.round(d.asistieron/d.total*100):0}%;background:var(--pink)"></div></div>
            ${d.total?Math.round(d.asistieron/d.total*100):0}%
          </div></td>
        </tr>`).join('')}
      </table>
    </div>`;
}

// ─── REGISTRO ─────────────────────────────────────────────────────────────────
function renderRegistro(c){
  const isProfe=currentUser.role==='profe';
  let ests=isProfe?DATA.estudiantes.filter(e=>e.grupo===currentUser.grupo):DATA.estudiantes;
  const grupos=[...new Set(DATA.estudiantes.map(e=>e.grupo))];
  const selGrupo=window._regGrupo||'todos';
  if(!isProfe&&selGrupo!=='todos') ests=DATA.estudiantes.filter(e=>e.grupo===selGrupo);

  c.innerHTML=`<div class="card">
    <div class="card-header"><span class="card-title">✅ Registro — ${new Date().toLocaleDateString('es-CO')}</span></div>
    <div style="padding:14px">

            <td>${e.alimentacion==='no'?'<span style="color:#aaa;font-size:12px">N/A</span>':`<input type="checkbox" ${reg.almorzó?'checked':''} onchange="toggleReg('${e.id}','almorzó',this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--green)"/>`}</td>

              e.alimentacion==='incluida'?'<span class="badge badge-green">Incluida</span>':

              ${e.deudaAlmuerzos>0?`<span class="deuda-chip">⚠️ Debe ${e.deudaAlmuerzos}</span>`:''}</span>`
            }</td>
          </tr>`;
        }).join('')}
      </table>
    </div>
  </div>`;
}

function toggleReg(estId,campo,val){
  const hoy=todayStr();
  let reg=DATA.registros.find(r=>r.estId===estId&&r.fecha===hoy);
  if(!reg){reg={estId,fecha:hoy,asistio:false,'almorzó':false};DATA.registros.push(reg);}
  reg[campo]=val;
  if(campo==='almorzó'){
    const est=DATA.estudiantes.find(e=>e.id===estId);
    if(est&&est.alimentacion!=='no'&&est.alimentacion!=='incluida'){
      if(val){if(est.saldoAlmuerzos>0)est.saldoAlmuerzos--;else est.deudaAlmuerzos++;}
      else{if(est.deudaAlmuerzos>0)est.deudaAlmuerzos--;else est.saldoAlmuerzos++;}
    }
  }
  save(); navigate('registro');
}

function saveEst(id){
  const n=document.getElementById('mNombre').value.trim();
  if(!n)return alert('Ingresa el nombre');
  if(id){
    const e=DATA.estudiantes.find(x=>x.id===id);
    e.nombre=n;e.grupo=document.getElementById('mGrupo').value;e.modalidad=document.getElementById('mMod').value;
    e.alimentacion=document.getElementById('mAlim').value;e.valorMensualidad=parseInt(document.getElementById('mValM').value)||0;
    e.valorAlmuerzo=parseInt(document.getElementById('mValA').value)||0;e.saldoAlmuerzos=parseInt(document.getElementById('mSaldo').value)||0;
    e.mensualidadPagada=document.getElementById('mMensPag').value==='1';
  } else {
    DATA.estudiantes.push({id:'e'+Date.now(),nombre:n,grupo:document.getElementById('mGrupo').value,modalidad:document.getElementById('mMod').value,
      alimentacion:document.getElementById('mAlim').value,valorMensualidad:parseInt(document.getElementById('mValM').value)||0,
      valorAlmuerzo:parseInt(document.getElementById('mValA').value)||0,saldoAlmuerzos:parseInt(document.getElementById('mSaldo').value)||0,
      deudaAlmuerzos:0,mensualidadPagada:document.getElementById('mMensPag').value==='1'});
  }
  save();document.querySelector('.modal-overlay').remove();navigate('estudiantes');
}

  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'mensualidad',valor:e.valorMensualidad,detalle:`Mensualidad ${new Date().toLocaleDateString('es-CO',{month:'long',year:'numeric'})}`});

}
function recargarAlm(id){

function confirmarRecarga(id){
  const dias=parseInt(document.getElementById('diasRecarga').value);

  const e=DATA.estudiantes.find(x=>x.id===id);
  e.saldoAlmuerzos+=dias;
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'almuerzos',valor:dias*e.valorAlmuerzo,detalle:`Recarga ${dias} almuerzos`});
  save();document.querySelector('.modal-overlay').remove();navigate('pagos');
}

      <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
      <button class="btn btn-pink" onclick="confirmarPagoDeuda('${id}')">Confirmar pago</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function confirmarPagoDeuda(id){
  const dias=parseInt(document.getElementById('diasDeuda').value);
  if(!dias||isNaN(dias)||dias<1)return alert('Ingresa un número válido');
  const e=DATA.estudiantes.find(x=>x.id===id);
  const pagar=Math.min(dias,e.deudaAlmuerzos);
  e.deudaAlmuerzos-=pagar;
  DATA.pagos.push({fecha:todayStr(),estudiante:e.nombre,tipo:'almuerzos',valor:pagar*e.valorAlmuerzo,detalle:`Pago deuda ${pagar} almuerzos`});
  save();document.querySelector('.modal-overlay').remove();navigate('pagos');
}

function generarPDF(tipo){
  const fecha=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const titles={diario:'REPORTE DIARIO DE ASISTENCIA',semanal:'REPORTE SEMANAL',mensual:'REPORTE MENSUAL',financiero:'REPORTE FINANCIERO',deudas:'REPORTE DE DEUDAS'};
  let tablaHTML='';
  let resumenHTML='';

  if(tipo==='diario'){
    const hoy=getRegistrosHoy();
    tablaHTML=`
      <p style="margin-bottom:10px"><b>Total estudiantes:</b> ${DATA.estudiantes.length} &nbsp;|&nbsp; <b>Asistieron:</b> ${hoy.filter(r=>r.asistio).length} &nbsp;|&nbsp; <b>Almorzaron:</b> ${hoy.filter(r=>r.almorzó).length}</p>
      <table><thead><tr><th>Estudiante</th><th>Grupo</th><th>Modalidad</th><th>Asistió</th><th>Almorzó</th></tr></thead><tbody>
      ${DATA.estudiantes.map(e=>{const r=getRegistroEst(e.id)||{};return`<tr><td>${e.nombre}</td><td>${e.grupo}</td><td>${e.modalidad==='TC'?'T. Completo':'M. Tiempo'}</td><td>${r.asistio?'✓ Sí':'✗ No'}</td><td>${e.alimentacion==='no'?'N/A':r.almorzó?'✓ Sí':'✗ No'}</td></tr>`;}).join('')}
      </tbody></table>`;
  }
  if(tipo==='financiero'){
    tablaHTML=`<table><thead><tr><th>Estudiante</th><th>Grupo</th><th>Mensualidad</th><th>Estado</th><th>Saldo Alm.</th><th>Deuda días</th><th>Valor deuda</th></tr></thead><tbody>
    ${DATA.estudiantes.map(e=>`<tr><td>${e.nombre}</td><td>${e.grupo}</td><td>${fmt(e.valorMensualidad)}</td><td>${e.mensualidadPagada?'✅ Pagada':'❌ Pendiente'}</td><td>${e.alimentacion==='no'?'N/A':`${e.saldoAlmuerzos} días`}</td><td>${e.deudaAlmuerzos}</td><td>${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)}</td></tr>`).join('')}
    </tbody></table>`;
  }
  if(tipo==='deudas'){
    const deudores=DATA.estudiantes.filter(e=>e.deudaAlmuerzos>0||!e.mensualidadPagada);
    tablaHTML=`<p style="margin-bottom:10px"><b>Total con deudas:</b> ${deudores.length} estudiantes</p>
    <table><thead><tr><th>Estudiante</th><th>Grupo</th><th>Deuda Mensualidad</th><th>Deuda Almuerzos</th><th>Total Deuda</th></tr></thead><tbody>
    ${deudores.map(e=>`<tr><td>${e.nombre}</td><td>${e.grupo}</td><td>${e.mensualidadPagada?'$0':fmt(e.valorMensualidad)}</td><td>${e.deudaAlmuerzos} días (${fmt(e.deudaAlmuerzos*e.valorAlmuerzo)})</td><td><b>${fmt((!e.mensualidadPagada?e.valorMensualidad:0)+(e.deudaAlmuerzos*e.valorAlmuerzo))}</b></td></tr>`).join('')}
    </tbody></table>`;
  }
  if(tipo==='semanal'||tipo==='mensual'){
    const grupos={};
    DATA.estudiantes.forEach(e=>{if(!grupos[e.grupo])grupos[e.grupo]={total:0,asistencias:0,almuerzos:0};grupos[e.grupo].total++;});
    DATA.registros.forEach(r=>{const e=DATA.estudiantes.find(x=>x.id===r.estId);if(!e||!grupos[e.grupo])return;if(r.asistio)grupos[e.grupo].asistencias++;if(r.almorzó)grupos[e.grupo].almuerzos++;});
    tablaHTML=`<table><thead><tr><th>Grupo</th><th>Estudiantes</th><th>Total Asistencias</th><th>Total Almuerzos</th><th>% Promedio</th></tr></thead><tbody>
    ${Object.entries(grupos).map(([g,d])=>`<tr><td>${g}</td><td>${d.total}</td><td>${d.asistencias}</td><td>${d.almuerzos}</td><td>${d.total?Math.round(d.asistencias/d.total*100):0}%</td></tr>`).join('')}
    </tbody></table>`;
  }

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <title>${titles[tipo]} — FMH</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
    body{padding:30px;color:#333;font-size:13px}
    .header{background:#E91E8C;color:#fff;padding:20px;border-radius:10px;text-align:center;margin-bottom:20px}
    .header h1{font-size:18px;margin-bottom:4px}
    .header p{font-size:11px;opacity:0.9}
    .titulo{font-size:16px;font-weight:700;color:#1A237E;text-align:center;margin-bottom:4px}
    .subtitulo{font-size:11px;color:#888;text-align:center;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th{background:#E91E8C;color:#fff;padding:8px 12px;text-align:left;font-size:12px}
    td{padding:8px 12px;border-bottom:1px solid #eee;font-size:12px}
    tr:nth-child(even) td{background:#FCE4EC}
    .footer{margin-top:30px;text-align:center;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px}
    .btn-print{display:block;margin:0 auto 20px;padding:10px 30px;background:#E91E8C;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
    @media print{.btn-print{display:none}}
  </style></head><body>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar como PDF</button>
  <div class="header">
    <h1>FUNDACIÓN MIS HABILIDADES</h1>
    <p>Fundación de Rehabilitación Integral, Formación y Educación — Ibagué, Tolima, Colombia</p>
  </div>
  <div class="titulo">${titles[tipo]}</div>
  <div class="subtitulo">Fecha: ${fecha} &nbsp;|&nbsp; Generado por: ${currentUser.nombre}</div>
  ${tablaHTML}
  <div class="footer">Fundación Mis Habilidades — Ibagué, Tolima | Documento generado el ${new Date().toLocaleString('es-CO')}</div>
  </body></html>`);
  win.document.close();
}

function cambiarPassCoord(){
  const np=document.getElementById('newCoordPass').value.trim();
  if(!np||np.length<6)return alert('La contraseña debe tener al menos 6 caracteres');
  COORD_CRED.pass=np;
  alert('✅ Contraseña de coordinadora actualizada correctamente');
  document.getElementById('newCoordPass').value='';
}

function agregarGrupo(){
  const g=prompt('Nombre del nuevo grupo:');
  if(!g||!g.trim())return;
  if(DATA.grupos.includes(g.trim().toUpperCase()))return alert('Ese grupo ya existe');
  DATA.grupos.push(g.trim().toUpperCase());
  save();navigate('config');
}

function reiniciarMensualidades(){
  if(!confirm('¿Marcar TODAS las mensualidades como pendientes para el nuevo mes?'))return;
  DATA.estudiantes.forEach(e=>e.mensualidadPagada=false);
  save();alert('✅ Mensualidades reiniciadas para el nuevo mes');navigate('config');
}
</script>
